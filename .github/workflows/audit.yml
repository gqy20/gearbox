name: Audit

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: '目标仓库 (留空则审计当前仓库)'
        required: false
        default: ''
      benchmarks:
        description: '对标仓库列表 (逗号分隔，可选)'
        required: false
        default: ''
      parallel_runs:
        description: '并行执行次数（workflow 编排层配置）'
        required: false
        default: '3'
      create_issues:
        description: '是否创建 Issues'
        required: false
        default: true
        type: boolean
      is_self_audit:
        description: '审计当前项目自身'
        required: false
        default: false
        type: boolean

  schedule:
    - cron: '0 9,21 * * *'

  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  plan:
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'schedule') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@audit') && github.event.comment.user.login != 'github-actions[bot]' && github.event.comment.user.login != 'copilot-pull-request-reviewer' && github.event.comment.user.login != 'dependabot[bot]' && github.event.comment.user.id != github.event.installation.id)
    runs-on: ubuntu-latest
    outputs:
      repo: ${{ steps.target.outputs.repo }}
      matrix_json: ${{ steps.matrix.outputs.matrix_json }}
      should_run: ${{ steps.cost_guardrail.outputs.should_run }}
    steps:
      - name: Determine target repo
        id: target
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "repo=${{ github.repository }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ inputs.is_self_audit }}" == "true" ] || [ -z "${{ inputs.target_repo }}" ]; then
            echo "repo=${{ github.repository }}" >> "$GITHUB_OUTPUT"
          else
            echo "repo=${{ inputs.target_repo }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Cost guardrail — daily budget & change detection
        id: cost_guardrail
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          MAX_DAILY_RUNS: ${{ vars.AUDIT_MAX_DAILY_RUNS || '2' }}
        shell: bash
        run: |
          set -euo pipefail
          REPO="${{ steps.target.outputs.repo }}"
          TODAY=$(date -u +%Y-%m-%d)

          # 1) Count today's completed audit runs (success or failure both count as executions)
          RUN_COUNT=$(gh run list \
            --workflow=audit.yml \
            --limit 100 \
            --json status,createdAt,event \
            --jq "[.[] | select(.event == 'schedule' and (.status == 'completed' or .status == 'in_progress') and (.createdAt | startswith(\"$TODAY\")))] | length" \
            2>/dev/null || echo "0")

          echo "::group::[guardrail] today's schedule runs = $RUN_COUNT / $MAX_DAILY_RUNS"

          if [ "$RUN_COUNT" -ge "$MAX_DAILY_RUNS" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=Daily limit reached ($RUN_COUNT/$MAX_DAILY_RUNS)" >> "$GITHUB_OUTPUT"
            echo "::warning::Audit skipped: daily execution limit ($MAX_DAILY_RUNS) already reached"
            echo "::endgroup::"
            exit 0
          fi

          # 2) Check whether target repo has new commits since last successful audit run
          LAST_SUCCESS=$(gh run list \
            --workflow=audit.yml \
            --limit 20 \
            --json status,createdAt,conclusion \
            --jq "[.[] | select(.event == 'schedule' and .conclusion == 'success')] | .[0].createdAt" \
            2>/dev/null || echo "")

          if [ -n "$LAST_SUCCESS" ]; then
            # Convert ISO timestamp to format expected by gh api (RFC3339)
            SINCE_ISO=$(python3 -c "
            from datetime import datetime, timezone
            dt = datetime.fromisoformat('$LAST_SUCCESS'.replace('Z', '+00:00'))
            print(dt.isoformat())
            " 2>/dev/null || echo "$LAST_SUCCESS")

            NEW_COMMITS=$(gh api "repos/$REPO/commits?since=$SINCE_ISO&per_page=1" \
              --jq '. | length' 2>/dev/null || echo "1")

            if [ "$NEW_COMMITS" -eq 0 ]; then
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              echo "skip_reason=No new commits since last audit ($LAST_SUCCESS)" >> "$GITHUB_OUTPUT"
              echo "::notice::Audit skipped: no new commits in $REPO since $LAST_SUCCESS"
              echo "::endgroup::"
              exit 0
            fi

            echo "[guardrail] $NEW_COMMITS new commit(s) since last audit — proceeding"
          else
            echo "[guardrail] No previous successful audit found — proceeding with first run"
          fi

          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "skip_reason=" >> "$GITHUB_OUTPUT"
          echo "::endgroup::"

      - name: Checkout
        uses: actions/checkout@v5

      - name: Build matrix
        id: matrix
        uses: ./actions/matrix
        with:
          count: ${{ github.event_name == 'workflow_dispatch' && inputs.parallel_runs || '3' }}

  audit-run:
    needs: plan
    if: |
      needs.plan.outputs.repo != '' && (
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'issue_comment' ||
        (github.event_name == 'schedule' && needs.plan.outputs.should_run == 'true')
      )
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix_json) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run Audit
        uses: ./actions/audit
        with:
          repo: ${{ needs.plan.outputs.repo }}
          benchmarks: ${{ github.event_name == 'workflow_dispatch' && inputs.benchmarks || '' }}
          output_dir: ./audit-output
          anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          anthropic_base_url: ${{ secrets.ANTHROPIC_BASE_URL }}
          model: ${{ secrets.ANTHROPIC_MODEL }}
          is_comment_event: ${{ github.event_name == 'issue_comment' }}
          comment_event_type: ${{ github.event_name }}
          issue_number: ${{ github.event.issue.number }}
          pr_number: ${{ github.event.issue.number }}

      - name: Upload run results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-results-run-${{ matrix.run_id }}
          path: audit-output/
          if-no-files-found: ignore

  aggregate-audit:
    needs: [plan, audit-run]
    if: |
      ${{ always() && needs.plan.result == 'success' && needs.plan.outputs.repo != '' }} && (
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'issue_comment' ||
        (github.event_name == 'schedule' && needs.plan.outputs.should_run == 'true')
      )
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Gearbox runtime
        uses: ./actions/_runtime

      - name: Download all run artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: audit-results-run-*
          path: ${{ github.workspace }}/audit-runs

      - name: Aggregate audit results
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          echo "::group::[audit] downloaded run artifacts"
          find "$GITHUB_WORKSPACE/audit-runs" -maxdepth 2 -type f | sort || true
          echo "::endgroup::"

          CMD=(
            uv run --directory "$GEARBOX_ACTION_ROOT" gearbox agent audit-select
            --input-root "$GITHUB_WORKSPACE/audit-runs"
            --output-dir "$GITHUB_WORKSPACE/audit-output"
            --max-turns 29
          )

          if [ -n "$ANTHROPIC_MODEL" ]; then
            CMD+=(--model "$ANTHROPIC_MODEL")
          fi

          "${CMD[@]}"

      - name: Upload final results
        uses: actions/upload-artifact@v4
        with:
          name: audit-results
          path: audit-output/

  create-issues:
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.create_issues == true) ||
      (github.event_name == 'schedule')
    needs: aggregate-audit
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_PAT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download results
        uses: actions/download-artifact@v4
        with:
          name: audit-results
          path: ./audit-output

      - name: Publish Issues
        uses: ./actions/publish
        with:
          input_path: ./audit-output/issues.json
