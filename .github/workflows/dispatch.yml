name: Dispatch

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: '目标仓库 (留空则使用当前仓库)'
        required: false
        default: ''
      issue_number:
        description: '指定 Issue 编号（可选；为空则从 ready backlog 中选择）'
        required: false
        default: ''
      max_items:
        description: '最多处理多少个 Issue'
        required: false
        default: '1'
      max_parallel:
        description: '每个 Issue 的并行实现次数'
        required: false
        default: '3'
      dry_run:
        description: '是否只输出计划，不创建分支和 PR'
        required: false
        default: true
        type: boolean
  schedule:
    - cron: '30 17 * * *'
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'schedule' && 'p0' || github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  plan:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@dispatch') && !github.event.issue.pull_request && github.event.comment.user.id != github.event.installation.id)
    runs-on: ubuntu-latest
    outputs:
      has_items: ${{ steps.plan.outputs.has_items }}
      matrix: ${{ steps.plan.outputs.matrix }}
      max_parallel: ${{ steps.plan.outputs.max_parallel }}
      dry_run: ${{ steps.plan.outputs.dry_run }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Gearbox runtime
        uses: ./actions/_runtime

      - name: Build dispatch matrix
        id: plan
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO: ${{ github.event_name == 'workflow_dispatch' && (inputs.target_repo || github.repository) || github.repository }}
          ISSUE_NUMBER: ${{ github.event_name == 'workflow_dispatch' && inputs.issue_number || github.event_name == 'issue_comment' && github.event.issue.number || '' }}
          MAX_ITEMS: ${{ github.event_name == 'workflow_dispatch' && inputs.max_items || '1' }}
          MAX_PARALLEL: ${{ github.event_name == 'workflow_dispatch' && inputs.max_parallel || '1' }}
          ALLOWED_PRIORITIES: ${{ github.event_name == 'schedule' && 'P0' || '' }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == false && 'false' || github.event_name == 'schedule' && 'false' || 'true' }}
        run: |
          set -e
          export PATH="$HOME/.local/bin:$PATH"

          CMD=(
            uv run --directory "$GITHUB_WORKSPACE" gearbox dispatch plan
            --repo "$REPO"
            --max-items "$MAX_ITEMS"
            --json-output
          )

          if [ -n "$ISSUE_NUMBER" ]; then
            CMD+=(--issue "$ISSUE_NUMBER")
          fi
          if [ -n "$ALLOWED_PRIORITIES" ]; then
            CMD+=(--allowed-priorities "$ALLOWED_PRIORITIES")
          fi

          "${CMD[@]}" > dispatch-plan.json
          cat dispatch-plan.json

          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          with open("dispatch-plan.json", encoding="utf-8") as file:
              plan = json.load(file)

          include = [
              {"issue_number": item["issue_number"]}
              for item in plan.get("items", [])
          ]

          max_parallel = int(os.environ["MAX_PARALLEL"])
          if max_parallel < 1:
              raise SystemExit("max_parallel must be a positive integer")

          print(f"matrix={json.dumps({'include': include}, ensure_ascii=False)}")
          print(f"has_items={'true' if include else 'false'}")
          print(f"max_parallel={max_parallel}")
          print(f"dry_run={os.environ['DRY_RUN']}")
          PY

  implement:
    needs: plan
    if: ${{ needs.plan.outputs.has_items == 'true' && needs.plan.outputs.dry_run == 'false' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    name: 'Implement issue #${{ matrix.issue_number }}'
    uses: ./.github/workflows/reusable-implement.yml
    with:
      repo: ${{ github.event_name == 'workflow_dispatch' && (inputs.target_repo || github.repository) || github.repository }}
      issue_number: ${{ matrix.issue_number }}
      base_branch: main
      parallel_runs: ${{ needs.plan.outputs.max_parallel }}
    secrets: inherit

  mark-has-pr:
    needs: [plan, implement]
    if: ${{ always() && needs.plan.result == 'success' && needs.implement.result == 'success' && needs.plan.outputs.has_items == 'true' && needs.plan.outputs.dry_run == 'false' }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
      REPO: ${{ github.event_name == 'workflow_dispatch' && (inputs.target_repo || github.repository) || github.repository }}
      MATRIX: ${{ needs.plan.outputs.matrix }}
    steps:
      - name: Mark dispatched issues
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY' | while read -r issue; do
          import json
          import os

          matrix = json.loads(os.environ["MATRIX"])
          for item in matrix.get("include", []):
              print(item["issue_number"])
          PY
            gh issue edit "$issue" --repo "$REPO" --add-label has-pr
          done
