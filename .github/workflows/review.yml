name: Review

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: '目标仓库 (留空则使用当前仓库)'
        required: false
        default: ''
      pr_number:
        description: 'PR 编号'
        required: true
        type: number
      parallel_runs:
        description: '并行执行次数（workflow 编排层配置）'
        required: false
        default: '3'
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  plan:
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'pull_request') ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@gearbox') && github.event.comment.user.id != github.event.installation.id)
    runs-on: ubuntu-latest
    outputs:
      repo: ${{ steps.target.outputs.repo }}
      pr: ${{ steps.target.outputs.pr }}
      matrix: ${{ steps.matrix.outputs.json }}
    steps:
      - name: Determine target
        id: target
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "repo=${{ inputs.target_repo || github.repository }}" >> "$GITHUB_OUTPUT"
            echo "pr=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "repo=${{ github.repository }}" >> "$GITHUB_OUTPUT"
            echo "pr=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build matrix
        id: matrix
        shell: bash
        env:
          COUNT: ${{ github.event_name == 'workflow_dispatch' && inputs.parallel_runs || '3' }}
        run: |
          if ! [[ "$COUNT" =~ ^[0-9]+$ ]] || [ "$COUNT" -lt 1 ]; then
            echo "::error::parallel_runs must be a positive integer"
            exit 1
          fi

          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          count = int(os.environ["COUNT"])
          print(f"json={json.dumps({'run_id': list(range(count))})}")
          PY

  review-run:
    needs: plan
    if: needs.plan.outputs.repo != '' && needs.plan.outputs.pr != ''
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run Review
        uses: ./actions/review
        with:
          repo: ${{ needs.plan.outputs.repo }}
          pr_number: ${{ needs.plan.outputs.pr }}
          max_turns: '10'
          model: ${{ secrets.ANTHROPIC_MODEL }}
          anthropic_base_url: ${{ secrets.ANTHROPIC_BASE_URL }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          artifact_path: ./review-output/result.json
          apply_side_effects: 'false'

      - name: Upload run results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: review-results-run-${{ matrix.run_id }}
          path: review-output/
          if-no-files-found: ignore

  aggregate-review:
    needs: [plan, review-run]
    if: ${{ always() && needs.plan.outputs.repo != '' && needs.plan.outputs.pr != '' }}
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup tools
        uses: ./actions/_setup

      - name: Download all run artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: review-results-run-*
          path: ./review-runs

      - name: Aggregate review results
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          CMD=(
            uv run --directory "$GITHUB_WORKSPACE" gearbox agent review-select
            --input-root ./review-runs
            --repo "${{ needs.plan.outputs.repo }}"
            --pr "${{ needs.plan.outputs.pr }}"
            --artifact-path ./review-output/result.json
          )

          if [ -n "$ANTHROPIC_MODEL" ]; then
            CMD+=(--model "$ANTHROPIC_MODEL")
          fi

          "${CMD[@]}"

      - name: Upload final result
        uses: actions/upload-artifact@v7
        with:
          name: review-results
          path: review-output/
