name: Gearbox - Audit
description: AI 驱动的仓库审计 - 发现改进建议
author: gqy20

inputs:
  repo:
    description: 仓库标识 (owner/name)
    required: true
  benchmarks:
    description: 逗号分隔的对标仓库列表（可选）
    required: false
    default: ''
  output_dir:
    description: 输出目录
    required: false
    default: ./output
  max_turns:
    description: 最大对话轮次
    required: false
    default: '50'
  system_prompt:
    description: 自定义 System Prompt（可选）
    required: false
    default: ''
  model:
    description: 使用的模型（可选）
    required: false
    default: ''
  anthropic_base_url:
    description: Anthropic 兼容接口 Base URL（可选）
    required: false
    default: ''
  anthropic_api_key:
    description: Anthropic API Key
    required: false
    default: ''
  is_comment_event:
    description: 是否由 issue/PR 触发的评论事件
    required: false
    default: 'false'
  comment_event_type:
    description: 事件类型 (issue_comment/issues/pull_request_review_comment)
    required: false
    default: ''
  issue_number:
    description: Issue 编号（评论事件时）
    required: false
    default: ''
  pr_number:
    description: PR 编号（评论事件时）
    required: false
    default: ''

outputs:
  issues_count:
    description: 生成的 Issue 数量
    value: ${{ steps.results.outputs.issues_count }}
  status:
    description: 执行状态
    value: ${{ steps.results.outputs.status }}

runs:
  using: composite
  steps:
  - name: Setup scanner tools
    uses: ./actions/_setup

  - name: Check API key
    if: inputs.anthropic_api_key == ''
    shell: bash
    env:
      ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
    run: |
      if [ -z "$ANTHROPIC_API_KEY" ] && [ -z "$ANTHROPIC_AUTH_TOKEN" ]; then
        echo "::error::API key required"
        exit 1
      fi

  - name: Run Audit Agent
    id: run
    shell: bash
    env:
      ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
      ANTHROPIC_BASE_URL_INPUT: ${{ inputs.anthropic_base_url }}
      GH_TOKEN: ${{ github.token }}
    run: |
      set -e

      INPUT_OUTPUT_DIR="${{ inputs.output_dir }}"
      case "$INPUT_OUTPUT_DIR" in
        /*) OUTPUT_DIR="$INPUT_OUTPUT_DIR" ;;
        *) OUTPUT_DIR="${GITHUB_WORKSPACE}/${INPUT_OUTPUT_DIR#./}" ;;
      esac
      mkdir -p "$OUTPUT_DIR"

      echo "::group::[audit] runtime config"
      echo "repo=${{ inputs.repo }}"
      echo "output_dir=$OUTPUT_DIR"
      echo "max_turns=${{ inputs.max_turns }}"
      echo "model=${{ inputs.model || '(default)' }}"
      echo "clone_strategy=always"
      if [ -n "$ANTHROPIC_BASE_URL_INPUT" ]; then
        echo "anthropic_base_url=$ANTHROPIC_BASE_URL_INPUT"
      else
        echo "anthropic_base_url=(default)"
      fi
      echo "::endgroup::"

      if [ -n "$ANTHROPIC_API_KEY" ]; then
        export ANTHROPIC_AUTH_TOKEN="$ANTHROPIC_API_KEY"
      fi
      if [ -n "$ANTHROPIC_BASE_URL_INPUT" ]; then
        export ANTHROPIC_BASE_URL="$ANTHROPIC_BASE_URL_INPUT"
      fi
      export PATH="$HOME/.local/bin:$PATH"

      CMD=(
        uv run --directory "${GITHUB_ACTION_PATH}/../.." gearbox agent audit-repo
        --repo "${{ inputs.repo }}"
        --output-dir "$OUTPUT_DIR"
        --benchmarks "${{ inputs.benchmarks }}"
        --max-turns "${{ inputs.max_turns }}"
      )

      if [ -n "${{ inputs.system_prompt }}" ]; then
        CMD+=(--system-prompt "${{ inputs.system_prompt }}")
      fi

      if [ -n "${{ inputs.model }}" ]; then
        CMD+=(--model "${{ inputs.model }}")
      fi

      "${CMD[@]}"

  - name: Parse results
    id: results
    shell: bash
    env:
      INPUT_OUTPUT_DIR: ${{ inputs.output_dir }}
    run: |
      export PATH="$HOME/.local/bin:$PATH"
      case "$INPUT_OUTPUT_DIR" in
        /*) OUTPUT_DIR="$INPUT_OUTPUT_DIR" ;;
        *) OUTPUT_DIR="${GITHUB_WORKSPACE}/${INPUT_OUTPUT_DIR#./}" ;;
      esac

      if [ -f "$OUTPUT_DIR/issues.json" ]; then
        ISSUES_COUNT=$(uv run --directory "${GITHUB_ACTION_PATH}/../.." python -c "import json; print(len(json.load(open('$OUTPUT_DIR/issues.json')).get('issues', [])))")
        echo "issues_count=$ISSUES_COUNT" >> $GITHUB_OUTPUT
        echo "✅ Audit completed: $ISSUES_COUNT issues generated"
        echo "status=success" >> $GITHUB_OUTPUT
      else
        echo "::error::No issues.json found"
        echo "::group::[audit] output dir diagnostics"
        if [ -d "$OUTPUT_DIR" ]; then
          find "$OUTPUT_DIR" -maxdepth 3 -type f | sort || true
        else
          echo "output directory does not exist: $OUTPUT_DIR"
        fi
        echo "::endgroup::"
        exit 1
      fi

  - name: Comment results (if triggered by issue/PR)
    if: inputs.is_comment_event == 'true'
    shell: bash
    env:
      GITHUB_REPOSITORY: ${{ github.repository }}
      OUTPUT_DIR: ${{ inputs.output_dir }}
      COMMENT_EVENT_TYPE: ${{ inputs.comment_event_type }}
      ISSUE_NUMBER: ${{ inputs.issue_number }}
      PR_NUMBER: ${{ inputs.pr_number }}
    run: |
      export PATH="$HOME/.local/bin:$PATH"
      uv run --directory "${GITHUB_ACTION_PATH}/../.." python <<'PY'
      import os
      from pathlib import Path

      from gearbox.core.gh import post_issue_comment, post_review_comment

      repo = os.environ["GITHUB_REPOSITORY"]
      output_dir = Path(os.environ["OUTPUT_DIR"])
      if not output_dir.is_absolute():
          output_dir = Path(os.environ["GITHUB_WORKSPACE"]) / str(output_dir).removeprefix("./")
      comparison_path = output_dir / "comparison.md"

      if not comparison_path.exists():
          print("⚠️ No comparison.md found, skipping comment")
          raise SystemExit(0)

      body = comparison_path.read_text(encoding="utf-8")
      event_type = os.environ["COMMENT_EVENT_TYPE"]
      print(f"Event type: {event_type}")

      if event_type in ("issue_comment", "issues"):
          issue_number = int(os.environ["ISSUE_NUMBER"])
          result = post_issue_comment(repo, issue_number, body)
          print(f"Issue comment: {'✅' if result.success else '❌'}")
      elif event_type == "pull_request_review_comment":
          pr_number = int(os.environ["PR_NUMBER"])
          result = post_review_comment(repo, pr_number, body)
          print(f"PR comment: {'✅' if result.success else '❌'}")
      else:
          print(f"⚠️ Unsupported comment event type: {event_type}")
      PY
