# Pre-commit 钩子配置
repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-yaml
  - id: check-added-large-files
  - id: check-json
  - id: check-toml
  - id: check-merge-conflict
  - id: debug-statements
  - id: check-docstring-first

  # YAML 格式化
- repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
  rev: v2.14.0
  hooks:
  - id: pretty-format-yaml
    args: [--autofix, --indent, '2']
    exclude: ^(.github/workflows/|\.mcp\.json$)

- repo: local
  hooks:
  - id: actionlint
    name: actionlint
    entry: bash -c 'command -v actionlint >/dev/null || go install github.com/rhysd/actionlint/cmd/actionlint@latest; export PATH="$(go env GOPATH)/bin:$PATH"; actionlint'
    language: system
    pass_filenames: false
  - id: ruff-check
    name: ruff check
    entry: uv run ruff check --fix --show-fixes
    language: system
    types_or: [python, pyi]
  - id: ruff-format
    name: ruff format
    entry: uv run ruff format
    language: system
    types_or: [python, pyi]
  - id: mypy
    name: mypy
    entry: uv run mypy src
    language: system
    pass_filenames: false

# 配置选项
default_stages: [pre-commit]
fail_fast: false
