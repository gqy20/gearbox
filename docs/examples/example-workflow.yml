# Gearbox 示例 workflow
#
# 这个文件同时展示两种接入方式：
# - action-audit：外部用户推荐使用的轻量 Marketplace action。
# - reusable-*：高级调用方需要复用 matrix 编排时才使用。

name: Gearbox Examples

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 运行模式
        required: true
        default: action-audit
        type: choice
        options:
        - action-audit
        - action-backlog
        - reusable-audit
        - reusable-review
      issues:
        description: Issue 编号列表（backlog 用）
        required: false
      pr_number:
        description: PR 编号（review 用）
        required: false
        type: number

jobs:
  action-audit:
    if: github.event.inputs.mode == 'action-audit'
    runs-on: ubuntu-latest
    steps:
    - uses: gqy20/gearbox-action@v1
      with:
        action: audit
        repo: ${{ github.repository }}
        benchmarks: github/copilot
        anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
        anthropic_base_url: ${{ secrets.ANTHROPIC_BASE_URL }}
        model: ${{ vars.ANTHROPIC_MODEL }}

  action-backlog:
    if: github.event.inputs.mode == 'action-backlog'
    runs-on: ubuntu-latest
    steps:
    - uses: gqy20/gearbox-action@v1
      with:
        action: backlog
        repo: ${{ github.repository }}
        issues: ${{ inputs.issues }}
        anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
        anthropic_base_url: ${{ secrets.ANTHROPIC_BASE_URL }}
        model: ${{ vars.ANTHROPIC_MODEL }}

  reusable-audit:
    if: github.event.inputs.mode == 'reusable-audit'
    uses: gqy20/gearbox/.github/workflows/reusable-audit.yml@main
    with:
      repo: ${{ github.repository }}
      benchmarks: github/copilot,sourcegraph/amp
      parallel_runs: '3'
      create_issues: false
    secrets: inherit

  reusable-review:
    if: github.event.inputs.mode == 'reusable-review'
    uses: gqy20/gearbox/.github/workflows/reusable-review.yml@main
    with:
      repo: ${{ github.repository }}
      pr_number: ${{ inputs.pr_number }}
      parallel_runs: '3'
    secrets: inherit
