name: Backlog

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: '目标仓库 (留空则使用当前仓库)'
        required: false
        default: ''
      issues:
        description: '逗号或空格分隔的 Issue 编号；数量决定单 issue 或 backlog 批量处理'
        required: true
      parallel_runs:
        description: '并行执行次数（workflow 编排层配置）'
        required: false
        default: '3'
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

jobs:
  plan:
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@backlog')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@backlog') && github.event.comment.user.id != github.event.installation.id)
    runs-on: ubuntu-latest
    outputs:
      repo: ${{ steps.target.outputs.repo }}
      issues: ${{ steps.target.outputs.issues }}
      matrix: ${{ steps.matrix.outputs.json }}
    steps:
      - name: Determine target
        id: target
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ inputs.target_repo }}" ]; then
              echo "repo=${{ inputs.target_repo }}" >> "$GITHUB_OUTPUT"
            else
              echo "repo=${{ github.repository }}" >> "$GITHUB_OUTPUT"
            fi
            echo "issues=${{ inputs.issues }}" >> "$GITHUB_OUTPUT"
          else
            echo "repo=${{ github.repository }}" >> "$GITHUB_OUTPUT"
            echo "issues=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build matrix
        id: matrix
        shell: bash
        env:
          COUNT: ${{ github.event_name == 'workflow_dispatch' && inputs.parallel_runs || '3' }}
          ISSUES: ${{ steps.target.outputs.issues }}
        run: |
          if ! [[ "$COUNT" =~ ^[0-9]+$ ]] || [ "$COUNT" -lt 1 ]; then
            echo "::error::parallel_runs must be a positive integer"
            exit 1
          fi

          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import re

          count = int(os.environ["COUNT"])
          issues = [int(part) for part in re.split(r"[\s,]+", os.environ["ISSUES"].strip()) if part]
          if not issues:
              raise SystemExit("issues must not be empty")
          matrix = {
              "include": [
                  {"issue_number": issue, "run_id": run_id}
                  for issue in issues
                  for run_id in range(count)
              ]
          }
          print(f"json={json.dumps(matrix)}")
          PY

  backlog-run:
    needs: plan
    if: needs.plan.outputs.repo != '' && needs.plan.outputs.issues != ''
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run Backlog
        uses: ./actions/backlog
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          repo: ${{ needs.plan.outputs.repo }}
          issues: ${{ matrix.issue_number }}
          max_turns: '5'
          model: ${{ secrets.ANTHROPIC_MODEL }}
          anthropic_base_url: ${{ secrets.ANTHROPIC_BASE_URL }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          artifact_path: ./backlog-output/result.json
          apply_side_effects: 'false'

      - name: Upload run results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backlog-results-issue-${{ matrix.issue_number }}-run-${{ matrix.run_id }}
          path: backlog-output/
          if-no-files-found: ignore

  aggregate-backlog:
    needs: [plan, backlog-run]
    if: ${{ always() && needs.plan.outputs.repo != '' && needs.plan.outputs.issues != '' }}
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Gearbox runtime
        uses: ./actions/_runtime

      - name: Download all run artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: backlog-results-issue-*-run-*
          path: ./backlog-runs

      - name: Aggregate backlog results
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          echo "::group::[backlog] downloaded run artifacts"
          find ./backlog-runs -maxdepth 2 -type f | sort || true
          echo "::endgroup::"

          CMD=(
            uv run --directory "$GEARBOX_ACTION_ROOT" gearbox agent backlog-select
            --input-root ./backlog-runs
            --repo "${{ needs.plan.outputs.repo }}"
            --artifact-path ./backlog-output/result.json
            --max-turns 29
          )

          if [ -n "$ANTHROPIC_MODEL" ]; then
            CMD+=(--model "$ANTHROPIC_MODEL")
          fi

          "${CMD[@]}"

      - name: Upload final result
        uses: actions/upload-artifact@v7
        with:
          name: backlog-results
          path: backlog-output/
