name: Repo Audit

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      target_repo:
        description: '目标仓库 (默认: gqy20/biotools_agent)'
        required: false
        default: 'gqy20/biotools_agent'
      benchmarks:
        description: '对标仓库列表 (逗号分隔，可选)'
        required: false
        default: ''

  # Issue/PR 评论触发
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, labeled]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  audit:
    # 手动触发或包含 @repo-auditor 时执行
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@repo-auditor')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@repo-auditor')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@repo-auditor'))
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      ANTHROPIC_MODEL: glm-4.7
      GH_TOKEN: ${{ secrets.GH_PAT }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Set up Python with uv
        run: uv venv && uv pip install -e .

      - name: Run audit
        env:
          TARGET_REPO: ${{ github.event.inputs.target_repo || 'gqy20/biotools_agent' }}
          BENCHMARKS: ${{ github.event.inputs.benchmarks || '' }}
        run: |
          if [ -n "$BENCHMARKS" ]; then
            uv run repo-auditor audit --repo "$TARGET_REPO" --benchmarks "$BENCHMARKS" --output ./audit-output
          else
            uv run repo-auditor audit --repo "$TARGET_REPO" --output ./audit-output
          fi

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: audit-results
          path: audit-output/

      - name: Comment results (if triggered by issue/PR)
        if: github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment' || github.event_name == 'issues'
        run: |
          # 读取 comparison.md 并评论
          if [ -f "audit-output/comparison.md" ]; then
            COMMENT_BODY=$(cat audit-output/comparison.md)

            if [ "${{ github.event_name }}" == "issue_comment" ] || [ "${{ github.event_name }}" == "issues" ]; then
              gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body "$COMMENT_BODY"
            else
              gh pr comment "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --body "$COMMENT_BODY"
            fi
          fi
