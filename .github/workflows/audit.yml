name: Repo Audit

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      target_repo:
        description: '目标仓库 (默认: gqy20/biotools_agent)'
        required: false
        default: 'gqy20/biotools_agent'
      benchmarks:
        description: '对标仓库列表 (逗号分隔，可选)'
        required: false
        default: ''
      create_issues:
        description: '是否创建 Issues (默认: false)'
        required: false
        default: 'false'

  # Issue/PR 评论触发
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, labeled]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  audit:
    # 手动触发或包含 @repo-auditor 时执行
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@repo-auditor')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@repo-auditor')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@repo-auditor'))
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      ANTHROPIC_MODEL: glm-4.7
    outputs:
      target_repo: ${{ env.TARGET_REPO }}
      create_issues: ${{ env.CREATE_ISSUES }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Set up Python with uv
        run: uv venv && uv pip install -e .

      - name: Run audit
        env:
          TARGET_REPO: ${{ github.event.inputs.target_repo || 'gqy20/biotools_agent' }}
          BENCHMARKS: ${{ github.event.inputs.benchmarks || '' }}
          CREATE_ISSUES: ${{ github.event.inputs.create_issues || 'false' }}
        run: |
          if [ -n "$BENCHMARKS" ]; then
            uv run repo-auditor audit --repo "$TARGET_REPO" --benchmarks "$BENCHMARKS" --output ./audit-output
          else
            uv run repo-auditor audit --repo "$TARGET_REPO" --output ./audit-output
          fi

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: audit-results
          path: audit-output/

  create-issues:
    # 只在手动触发且 create_issues=true 时执行
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.create_issues == 'true'
    needs: audit
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Download results
        uses: actions/download-artifact@v4
        with:
          name: audit-results
          path: ./audit-output

      - name: Create GitHub Issues
        run: |
          if [ ! -f "audit-output/issues.json" ]; then
            echo "❌ issues.json not found!"
            exit 1
          fi

          # 读取 issues.json 并创建 Issues
          python3 << 'PYTHON_SCRIPT'
          import json
          import subprocess
          import sys

          with open('audit-output/issues.json', 'r') as f:
              data = json.load(f)

          issues = data.get('issues', [])
          print(f"Found {len(issues)} issues to create")

          created = []
          failed = []

          for i, issue in enumerate(issues, 1):
              repo = issue.get('repo')
              title = issue.get('title')
              body = issue.get('body')
              labels = issue.get('labels', '')

              if not all([repo, title, body]):
                  print(f"⚠️  Issue {i} missing required fields, skipping")
                  failed.append(f"{i}: {title}")
                  continue

              try:
                  # 过滤标签，只使用已存在的标签
                  valid_labels = ["bug", "documentation", "duplicate", "enhancement",
                                  "good first issue", "help wanted", "invalid", "question", "wontfix"]
                  filtered_labels = []
                  if labels:
                      for label in labels.split(','):
                          label = label.strip()
                          if label in valid_labels:
                              filtered_labels.append(label)
                          else:
                              print(f"  ⚠️  Skipping unknown label: {label}")

                  cmd = ['gh', 'issue', 'create', '--repo', repo, '--title', title, '--body', body]
                  for label in filtered_labels:
                      cmd.extend(['--label', label])

                  result = subprocess.run(cmd, check=True, capture_output=True, text=True)
                  issue_url = result.stdout.strip()
                  print(f"✅ [{i}/{len(issues)}] Created: {title}")
                  print(f"   {issue_url}")
                  created.append(issue_url)
              except subprocess.CalledProcessError as e:
                  print(f"❌ Failed to create issue: {title}")
                  print(f"   Error: {e.stderr}")
                  failed.append(f"{title}")

          print(f"\n## Summary")
          print(f"✅ Created: {len(created)}")
          print(f"❌ Failed: {len(failed)}")

          if failed:
              print(f"\nFailed issues:")
              for f in failed:
                  print(f"  - {f}")
              sys.exit(1)
          PYTHON_SCRIPT

      - name: Comment results (if triggered by issue/PR)
        if: |
          github.event_name == 'issue_comment' ||
          github.event_name == 'pull_request_review_comment' ||
          github.event_name == 'issues'
        run: |
          if [ -f "audit-output/comparison.md" ]; then
            COMMENT_BODY=$(cat audit-output/comparison.md)

            if [ "${{ github.event_name }}" == "issue_comment" ] || [ "${{ github.event_name }}" == "issues" ]; then
              gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body "$COMMENT_BODY"
            else
              gh pr comment "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --body "$COMMENT_BODY"
            fi
          fi
