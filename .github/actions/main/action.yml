name: 'Gearbox'
description: 'AI 驱动的 GitHub 仓库自动化飞轮系统'
author: 'gqy20'

branding:
  icon: 'gear'
  color: 'blue'

inputs:
  action:
    description: '要执行的操作 (audit/triage/review/implement/publish)'
    required: true
    default: 'audit'

runs:
  using: 'composite'
  steps:
    - name: Run ${{ inputs.action }}
      uses: ../${{ inputs.action }}
