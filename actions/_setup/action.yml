name: 'Setup Tools'
description: 'Install required CLI tools for Gearbox agents'
author: 'gqy20'

runs:
  using: 'composite'
  steps:
    # ============================================
    # Environment checks
    # ============================================
    - name: Check Node.js
      shell: bash
      run: |
        if ! command -v node &> /dev/null; then
          echo "::error::Node.js is required"
          exit 1
        fi
        echo "✅ Node.js: $(node --version)"

    - name: Check npm
      shell: bash
      run: |
        if ! command -v npm &> /dev/null; then
          echo "::error::npm is required"
          exit 1
        fi
        echo "✅ npm: $(npm --version)"

    - name: Check Python
      shell: bash
      run: |
        if ! command -v python3 &> /dev/null; then
          echo "::error::python3 is required"
          exit 1
        fi
        echo "✅ Python: $(python3 --version)"

    - name: Check Go
      shell: bash
      run: |
        if ! command -v go &> /dev/null; then
          echo "⚠️  Go not found (govulncheck will not be available)"
        else
          echo "✅ Go: $(go version | awk '{print $3}')"
        fi

    # ============================================
    # Node.js tools
    # ============================================
    - name: Install ctx7
      id: ctx7
      shell: bash
      run: |
        set -e
        if command -v ctx7 &> /dev/null; then
          echo "✅ ctx7 already installed"
        else
          echo "📦 Installing ctx7..."
          npm install -g ctx7
          echo "✅ ctx7 installed"
        fi

    - name: Install semgrep
      id: semgrep
      shell: bash
      run: |
        set -e
        if command -v semgrep &> /dev/null; then
          echo "✅ semgrep already installed: $(semgrep --version)"
        else
          echo "📦 Installing semgrep..."
          npm install -g @semgrep/cli
          echo "✅ semgrep installed: $(semgrep --version)"
        fi

    - name: Install ts-prune
      id: ts-prune
      shell: bash
      run: |
        set -e
        if command -v ts-prune &> /dev/null; then
          echo "✅ ts-prune already installed"
        else
          echo "📦 Installing ts-prune..."
          npm install -g ts-prune
          echo "✅ ts-prune installed"
        fi

    # ============================================
    # Python tools
    # ============================================
    - name: Install deptry
      id: deptry
      shell: bash
      run: |
        set -e
        if command -v deptry &> /dev/null; then
          echo "✅ deptry already installed: $(deptry --version)"
        else
          echo "📦 Installing deptry..."
          pip install deptry
          echo "✅ deptry installed: $(deptry --version)"
        fi

    # ============================================
    # Go tools
    # ============================================
    - name: Install govulncheck
      id: govulncheck
      if: ${{ runner.os == 'Linux' }}
      shell: bash
      run: |
        set -e
        if ! command -v go &> /dev/null; then
          echo "⚠️  Skipping govulncheck (Go not available)"
          exit 0
        fi
        if command -v govulncheck &> /dev/null; then
          echo "✅ govulncheck already installed"
        else
          echo "📦 Installing govulncheck..."
          go install golang.org/x/vuln/cmd/govulncheck@latest
          echo "✅ govulncheck installed"
        fi

    # ============================================
    # System tools (apt)
    # ============================================
    - name: Install system tools
      shell: bash
      run: |
        set -e
        TOOLS=""
        if ! command -v cloc &> /dev/null; then TOOLS="$TOOLS cloc"; fi
        if ! command -v trivy &> /dev/null; then TOOLS="$TOOLS trivy"; fi

        if [ -n "$TOOLS" ]; then
          echo "📦 Installing: $TOOLS"
          apt-get update -qq && apt-get install -y -qq $TOOLS
          echo "✅ System tools installed"
        else
          echo "✅ System tools already installed"
        fi

    # ============================================
    # Verify all tools
    # ============================================
    - name: Verify tools
      shell: bash
      run: |
        echo "=== Tool Status ==="
        echo "ctx7:      $(command -v ctx7 && ctx7 --version 2>/dev/null || echo 'not found')"
        echo "semgrep:   $(command -v semgrep && semgrep --version 2>/dev/null || echo 'not found')"
        echo "ts-prune:  $(command -v ts-prune || echo 'not found')"
        echo "deptry:    $(command -v deptry && deptry --version 2>/dev/null || echo 'not found')"
        echo "govulncheck: $(command -v govulncheck || echo 'not found')"
        echo "cloc:      $(command -v cloc && cloc --version 2>/dev/null | head -1 || echo 'not found')"
        echo "trivy:     $(command -v trivy && trivy --version 2>/dev/null || echo 'not found')"
        echo "gh:        $(command -v gh && gh --version 2>/dev/null | head -1 || echo 'not found')"
        echo "python3:   $(command -v python3 && python3 --version || echo 'not found')"
        echo "go:        $(command -v go && go version 2>/dev/null | awk '{print $3}' || echo 'not found')"
        echo "=================="
