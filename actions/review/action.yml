name: 'Gearbox - Review'
description: 'AI 驱动的 PR Code Review'
author: 'gqy20'

inputs:
  github_token:
    description: 'GitHub Token'
    required: false
    default: ${{ github.token }}

  model:
    description: 'Claude 模型'
    required: false
    default: 'claude-sonnet-4-6'

  max_turns:
    description: '最大对话轮次'
    required: false
    default: '10'

  dry_run:
    description: '试运行模式（不发布 Review）'
    required: false
    default: 'false'

  anthropic_api_key:
    description: 'Anthropic API Key'
    required: false
    default: ''

outputs:
  verdict:
    description: '审查结论 LGTM/Request Changes/Comment Only'
    value: ${{ steps.run.outputs.verdict }}
  score:
    description: '质量评分 0-10'
    value: ${{ steps.run.outputs.score }}
  status:
    description: '执行状态'
    value: ${{ steps.run.outputs.status }}

runs:
  using: 'composite'
  steps:
    - name: Check environment
      shell: bash
      run: |
        echo "🔍 Gearbox Review Agent"
        echo "Repo: ${{ github.repository }}"
        echo "PR: ${{ github.event.pull_request.number }}"

    - name: Check API key
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
      run: |
        if [ -z "$ANTHROPIC_API_KEY" ] && [ -z "$ANTHROPIC_AUTH_TOKEN" ]; then
          echo "::error::API key required"
          exit 1
        fi

    - name: Run Review Agent
      id: run
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
        GITHUB_OUTPUT: ${{ runner.temp }}/github_output
      run: |
        set -e
        if [ -n "$ANTHROPIC_API_KEY" ]; then
          export ANTHROPIC_AUTH_TOKEN="$ANTHROPIC_API_KEY"
        fi

        python3 -m gearbox.cli agent review \
          --repo "${{ github.repository }}" \
          --pr "${{ github.event.pull_request.number }}" \
          --model "${{ inputs.model }}" \
          --max-turns "${{ inputs.max_turns }}" \
          --output "$GITHUB_OUTPUT"

    - name: Verify completion
      if: ${{ inputs.dry_run == 'false' }}
      shell: bash
      run: |
        source $GITHUB_OUTPUT
        echo "✅ Review completed: verdict=$verdict, score=$score"
