# 最简调用 — 直接拷贝到 .github/workflows/gearbox.yml

on: [push, pull_request]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./actions/main
        with:
          action: audit
          repo: ${{ github.repository }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
