name: Audit

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: '目标仓库 (留空则审计当前仓库)'
        required: false
        default: ''
      benchmarks:
        description: '对标仓库列表 (逗号分隔，可选)'
        required: false
        default: ''
      parallel_runs:
        description: '并行执行次数（workflow 编排层配置）'
        required: false
        default: '3'
      create_issues:
        description: '是否创建 Issues'
        required: false
        default: false
        type: boolean
      is_self_audit:
        description: '审计当前项目自身'
        required: false
        default: false
        type: boolean

  schedule:
    - cron: '0 1 * * 1'

  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, labeled]

jobs:
  audit-dispatch:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/reusable-audit.yml
    with:
      repo: ${{ (inputs.is_self_audit || inputs.target_repo == '') && github.repository || inputs.target_repo }}
      benchmarks: ${{ inputs.benchmarks }}
      parallel_runs: ${{ inputs.parallel_runs }}
      create_issues: ${{ inputs.create_issues }}
    secrets: inherit

  audit-schedule:
    if: github.event_name == 'schedule'
    uses: ./.github/workflows/reusable-audit.yml
    with:
      repo: ${{ github.repository }}
      benchmarks: ''
      parallel_runs: '3'
      create_issues: false
    secrets: inherit

  audit-issue-comment:
    if: github.event_name == 'issue_comment' && contains(github.event.comment.body, '@gearbox') && github.event.comment.user.id != github.event.installation.id
    uses: ./.github/workflows/reusable-audit.yml
    with:
      repo: ${{ github.repository }}
      benchmarks: ''
      parallel_runs: '3'
      create_issues: false
    secrets: inherit

  audit-pr-review-comment:
    if: github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@gearbox') && github.event.comment.user.id != github.event.installation.id
    uses: ./.github/workflows/reusable-audit.yml
    with:
      repo: ${{ github.repository }}
      benchmarks: ''
      parallel_runs: '3'
      create_issues: false
    secrets: inherit

  audit-issue-body:
    if: github.event_name == 'issues' && contains(github.event.issue.body, '@gearbox')
    uses: ./.github/workflows/reusable-audit.yml
    with:
      repo: ${{ github.repository }}
      benchmarks: ''
      parallel_runs: '3'
      create_issues: false
    secrets: inherit
