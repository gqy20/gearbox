name: 'Gearbox AI Workflows'

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'audit'
        type: choice
        options:
          - audit
          - triage
          - review
          - implement

jobs:
  gearbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Audit Repository
        if: github.event.inputs.mode == 'audit'
        uses: ./actions/main
        with:
          action: audit
          repo: ${{ github.repository }}
          benchmarks: ''
          parallel_count: 3
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Triage Issue
        if: github.event.inputs.mode == 'triage'
        uses: ./actions/main
        with:
          action: triage
          repo: ${{ github.repository }}
          issue_number: ${{ github.event.issue.number }}
          max_turns: 5
          parallel_count: 3
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Review PR
        if: github.event.inputs.mode == 'review'
        uses: ./actions/main
        with:
          action: review
          repo: ${{ github.repository }}
          pr_number: ${{ github.event.pull_request.number }}
          max_turns: 10
          parallel_count: 3
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Implement Issue
        if: github.event.inputs.mode == 'implement'
        uses: ./actions/main
        with:
          action: implement
          repo: ${{ github.repository }}
          issue_number: ${{ github.event.issue.number }}
          base_branch: main
          max_turns: 20
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
