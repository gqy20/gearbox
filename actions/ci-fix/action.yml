name: 'Gearbox - CI Fix'
description: 'AI 驱动的 CI 失败自动修复'
author: 'gqy20'

inputs:
  github_token:
    description: 'GitHub Token'
    required: false
    default: ${{ github.token }}

  model:
    description: 'Claude 模型（建议 opus）'
    required: false
    default: 'claude-opus-4-7'

  max_turns:
    description: '最大对话轮次'
    required: false
    default: '15'

  base_branch:
    description: 'PR 目标分支'
    required: false
    default: 'main'

  dry_run:
    description: '试运行模式'
    required: false
    default: 'false'

  anthropic_api_key:
    description: 'Anthropic API Key'
    required: false
    default: ''

outputs:
  branch_name:
    description: '修复分支名'
    value: ${{ steps.run.outputs.branch_name }}
  root_cause:
    description: '根本原因'
    value: ${{ steps.run.outputs.root_cause }}
  pr_url:
    description: '修复 PR URL'
    value: ${{ steps.run.outputs.pr_url }}
  status:
    description: '执行状态'
    value: ${{ steps.run.outputs.status }}

runs:
  using: 'composite'
  steps:
    - name: Check environment
      shell: bash
      run: |
        echo "🔧 Gearbox CI Fix Agent"
        echo "Repo: ${{ github.repository }}"
        echo "Run ID: ${{ github.event.workflow_run.id }}"
        echo "Branch: ${{ github.event.workflow_run.head_branch }}"

    - name: Check API key
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
      run: |
        if [ -z "$ANTHROPIC_API_KEY" ] && [ -z "$ANTHROPIC_AUTH_TOKEN" ]; then
          echo "::error::API key required"
          exit 1
        fi

    - name: Prepare working branch
      shell: bash
      env:
        GEARBOX_BASE_BRANCH: ${{ inputs.base_branch }}
      run: |
        TEMP_BRANCH="gearbox/ci-fix-temp-$(date +%s)"
        git fetch origin $GEARBOX_BASE_BRANCH
        git checkout -b "$TEMP_BRANCH" "origin/$GEARBOX_BASE_BRANCH"
        echo "TEMP_BRANCH=$TEMP_BRANCH" >> $GITHUB_ENV

    - name: Run CI Fix Agent
      id: run
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
        GEARBOX_MODEL: ${{ inputs.model }}
        GEARBOX_MAX_TURNS: ${{ inputs.max_turns }}
        GEARBOX_REPO: ${{ github.repository }}
        GEARBOX_RUN_ID: ${{ github.event.workflow_run.id }}
        GEARBOX_BASE_BRANCH: ${{ inputs.base_branch }}
        GITHUB_OUTPUT: ${{ runner.temp }}/github_output
      run: |
        set -e
        if [ -n "$ANTHROPIC_API_KEY" ]; then
          export ANTHROPIC_AUTH_TOKEN="$ANTHROPIC_API_KEY"
        fi

        python3 << 'PYEOF'
        import asyncio, json, os, sys
        sys.path.insert(0, os.path.join(os.getcwd(), 'src'))
        from gearbox.agents.ci_fix import run_ci_fix

        async def main():
            result = await run_ci_fix(
                os.environ['GEARBOX_REPO'],
                int(os.environ['GEARBOX_RUN_ID']),
                model=os.environ.get('GEARBOX_MODEL', 'claude-opus-4-7'),
                base_branch=os.environ.get('GEARBOX_BASE_BRANCH', 'main'),
                max_turns=int(os.environ.get('GEARBOX_MAX_TURNS', '15')),
            )
            output = {
                'branch_name': result.branch_name or '',
                'root_cause': result.root_cause or '',
                'fix_description': result.fix_description or '',
                'files_changed': json.dumps(result.files_changed),
                'pr_url': result.pr_url or '',
                'fixed': str(result.fixed).lower(),
            }
            with open(os.environ.get('GITHUB_OUTPUT', '/tmp/github_output'), 'w') as f:
                for k, v in output.items():
                    f.write(f"{k}={v}\n")
            print(f"✅ CI Fix: branch={result.branch_name}, fixed={result.fixed}")

        asyncio.run(main())
        PYEOF

    - name: Finalize branch and PR
      shell: bash
      if: ${{ inputs.dry_run == 'false' }}
      env:
        GEARBOX_REPO: ${{ github.repository }}
        GEARBOX_RUN_ID: ${{ github.event.workflow_run.id }}
      run: |
        set -e
        source $GITHUB_OUTPUT

        if [ "$fixed" != "true" ] || [ -z "$branch_name" ]; then
          echo "⚠️ Agent did not complete fix, skipping PR creation"
          echo "status=partial" >> $GITHUB_OUTPUT
          exit 0
        fi

        # Rename temp branch to final branch name
        TEMP_BRANCH="${TEMP_BRANCH:-gearbox/ci-fix-temp}"
        git branch -m "$TEMP_BRANCH" "$branch_name"

        # Add all changed files
        git add -A

        # Check if there are changes to commit
        if git diff --staged --quiet; then
          echo "⚠️ No changes to commit"
          echo "status=partial" >> $GITHUB_OUTPUT
          exit 0
        fi

        # Commit
        git commit -m "fix: $fix_description

        Root cause: $root_cause

        Closes #$GEARBOX_RUN_ID"

        # Push to remote
        git push -u origin "$branch_name"

        # Create PR
        PR_URL=$(gh pr create \
          --repo "$GEARBOX_REPO" \
          --title "ci-fix: $fix_description" \
          --body "## Root Cause

$root_cause

## Fix

$fix_description

Closes #$GEARBOX_RUN_ID" \
          --head "$branch_name" \
          --base "$GEARBOX_BASE_BRANCH")

        echo "✅ PR created: $PR_URL"
        echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Cleanup on dry run
      shell: bash
      if: ${{ inputs.dry_run == 'true' }}
      run: |
        TEMP_BRANCH="${TEMP_BRANCH:-gearbox/ci-fix-temp-$(date +%s)}"
        git checkout "$GEARBOX_BASE_BRANCH"
        git branch -D "$TEMP_BRANCH" 2>/dev/null || true
        echo "status=dry_run" >> $GITHUB_OUTPUT
