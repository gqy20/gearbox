name: Gearbox - Implement
description: AI 驱动的 Issue → 分支/PR 自动实现
author: gqy20

inputs:
  repo:
    description: 仓库标识 (owner/name)
    required: true
  issue_number:
    description: Issue 编号
    required: true
    type: number
  base_branch:
    description: PR 目标分支
    required: false
    default: main
  max_turns:
    description: 最大对话轮次
    required: false
    default: '80'
  model:
    description: 使用的模型（可选）
    required: false
    default: ''
  anthropic_base_url:
    description: Anthropic 兼容接口 Base URL（可选）
    required: false
    default: ''
  anthropic_api_key:
    description: Anthropic API Key
    required: false
    default: ''
  artifact_path:
    description: '可选: 写出结构化结果 artifact'
    required: false
    default: ./implement-output/result.json
  apply_side_effects:
    description: 是否创建分支/PR（并行时建议关闭）
    required: false
    default: 'false'

outputs:
  status:
    description: 执行状态
    value: ${{ steps.run.outputs.status }}

runs:
  using: composite
  steps:
  - name: Setup Gearbox runtime
    uses: ./actions/_runtime

  - name: Run Implement Agent
    id: run
    shell: bash
    env:
      ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
      ANTHROPIC_BASE_URL_INPUT: ${{ inputs.anthropic_base_url }}
    run: |
      set -e

      if [ -n "$ANTHROPIC_API_KEY" ]; then
        export ANTHROPIC_AUTH_TOKEN="$ANTHROPIC_API_KEY"
      fi
      if [ -n "$ANTHROPIC_BASE_URL_INPUT" ]; then
        export ANTHROPIC_BASE_URL="$ANTHROPIC_BASE_URL_INPUT"
      fi
      export PATH="$HOME/.local/bin:$PATH"

      if [ "${{ inputs.apply_side_effects }}" = "true" ] && [ -z "${GH_TOKEN:-}" ]; then
        echo "::error::GH_TOKEN is required when apply_side_effects=true. Pass secrets.GH_PAT so Gearbox can push branches and create PRs."
        exit 1
      fi

      INPUT_ARTIFACT_PATH="${{ inputs.artifact_path }}"
      ARTIFACT_PATH=""
      if [ -n "$INPUT_ARTIFACT_PATH" ]; then
        case "$INPUT_ARTIFACT_PATH" in
          /*) ARTIFACT_PATH="$INPUT_ARTIFACT_PATH" ;;
          *) ARTIFACT_PATH="${GITHUB_WORKSPACE}/${INPUT_ARTIFACT_PATH#./}" ;;
        esac
        mkdir -p "$(dirname "$ARTIFACT_PATH")"
      fi

      CMD=(
        uv run --directory "${GITHUB_ACTION_PATH}/../.." gearbox agent implement
        --repo "${{ inputs.repo }}"
        --issue "${{ inputs.issue_number }}"
        --base-branch "${{ inputs.base_branch }}"
        --max-turns "${{ inputs.max_turns }}"
      )

      if [ -n "$ARTIFACT_PATH" ]; then
        CMD+=(--artifact-path "$ARTIFACT_PATH")
      fi

      if [ -n "${{ inputs.model }}" ]; then
        CMD+=(--model "${{ inputs.model }}")
      fi

      if [ "${{ inputs.apply_side_effects }}" = "true" ]; then
        CMD+=(--apply-side-effects)
      else
        CMD+=(--no-apply-side-effects)
      fi

      "${CMD[@]}"

      echo "status=success" >> $GITHUB_OUTPUT
