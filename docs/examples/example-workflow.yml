name: Gearbox Examples

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 运行模式
        required: true
        default: action-audit
        type: choice
        options:
        - action-audit
        - reusable-audit
        - reusable-triage
        - reusable-review
      issue_number:
        description: Issue 编号（triage 用）
        required: false
        type: number
      pr_number:
        description: PR 编号（review 用）
        required: false
        type: number

jobs:
  action-audit:
    if: github.event.inputs.mode == 'action-audit'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: ./actions/main
      with:
        action: audit
        repo: ${{ github.repository }}
        benchmarks: github/copilot
        anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
        anthropic_base_url: ${{ secrets.ANTHROPIC_BASE_URL }}
        model: ${{ secrets.ANTHROPIC_MODEL }}

  reusable-audit:
    if: github.event.inputs.mode == 'reusable-audit'
    uses: ./.github/workflows/reusable-audit.yml
    with:
      repo: ${{ github.repository }}
      benchmarks: github/copilot,sourcegraph/amp
      parallel_runs: '3'
      create_issues: false
    secrets: inherit

  reusable-triage:
    if: github.event.inputs.mode == 'reusable-triage'
    uses: ./.github/workflows/reusable-triage.yml
    with:
      repo: ${{ github.repository }}
      issue_number: ${{ inputs.issue_number }}
      parallel_runs: '3'
    secrets: inherit

  reusable-review:
    if: github.event.inputs.mode == 'reusable-review'
    uses: ./.github/workflows/reusable-review.yml
    with:
      repo: ${{ github.repository }}
      pr_number: ${{ inputs.pr_number }}
      parallel_runs: '3'
    secrets: inherit
