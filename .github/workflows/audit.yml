name: Repo Audit

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, labeled]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  audit:
    if: contains(github.event.comment.body, '@repo-auditor') || contains(github.event.issue.body, '@repo-auditor')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          system-prompt: |
            你是 Repo Auditor，一个专业的代码库审计专家。

            当收到 @repo-auditor audit 命令时，请审计仓库：
            - 默认目标: https://github.com/gqy20/biotools_agent
            - 如果用户指定了其他仓库，则审计用户指定的仓库

            ## 分析流程

            请自主完成以下分析（使用 gh 命令进行 GitHub 操作）：
            1. 分析仓库结构（Read/Glob 查看关键文件）
            2. 发现对标项目（gh search repos 或使用内置工具）
            3. 生成能力对比矩阵
            4. 产出改进建议 Issue

            ## 可用工具

            - Read/Glob/Grep: 分析代码
            - Bash: 执行命令（包括 gh CLI）
            - Write: 保存文件
            - 自定义工具: generate_profile, discover_benchmarks, create_comparison, create_issue

            ## 输出要求

            直接在 Issue/PR 中发布结果：
            - 对比矩阵（Markdown 表格）
            - 改进建议 Issue（带证据、路线、收益）

          settings: |
            {
              "mcpServers": {
                "web-search-prime": {
                  "type": "http",
                  "url": "https://open.bigmodel.cn/api/mcp/web_search_prime/mcp",
                  "headers": {
                    "Authorization": "Bearer $ANTHROPIC_AUTH_TOKEN"
                  }
                },
                "context7": {
                  "type": "http",
                  "url": "https://open.bigmodel.cn/api/mcp/context7/mcp",
                  "headers": {
                    "Authorization": "Bearer $ANTHROPIC_AUTH_TOKEN"
                  }
                }
              }
            }
        env:
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
