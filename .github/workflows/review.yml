name: Review

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: '目标仓库 (留空则使用当前仓库)'
        required: false
        default: ''
      pr_number:
        description: 'PR 编号'
        required: true
        type: number
      parallel_runs:
        description: '并行执行次数（workflow 编排层配置）'
        required: false
        default: '3'
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'pull_request') ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@gearbox') && github.event.comment.user.id != github.event.installation.id)
    uses: ./.github/workflows/reusable-review.yml
    with:
      repo: ${{ github.event_name == 'workflow_dispatch' && (inputs.target_repo || github.repository) || github.repository }}
      pr_number: ${{ github.event_name == 'workflow_dispatch' && inputs.pr_number || github.event.pull_request.number }}
      parallel_runs: ${{ github.event_name == 'workflow_dispatch' && inputs.parallel_runs || '3' }}
    secrets: inherit
