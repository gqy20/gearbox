name: Reusable Audit

on:
  workflow_call:
    inputs:
      repo:
        description: '目标仓库 (owner/name)'
        required: true
        type: string
      benchmarks:
        description: '对标仓库列表 (逗号分隔，可选)'
        required: false
        default: ''
        type: string
      parallel_runs:
        description: '并行执行次数'
        required: false
        default: '3'
        type: string
      create_issues:
        description: '是否创建 Issues'
        required: false
        default: false
        type: boolean
    secrets:
      ANTHROPIC_AUTH_TOKEN:
        required: true
      ANTHROPIC_BASE_URL:
        required: false
      ANTHROPIC_MODEL:
        required: false
      GH_PAT:
        required: false

permissions:
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.json }}
    steps:
      - name: Build matrix
        id: matrix
        shell: bash
        env:
          COUNT: ${{ inputs.parallel_runs }}
        run: |
          if ! [[ "$COUNT" =~ ^[0-9]+$ ]] || [ "$COUNT" -lt 1 ]; then
            echo "::error::parallel_runs must be a positive integer"
            exit 1
          fi

          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          count = int(os.environ["COUNT"])
          print(f"json={json.dumps({'run_id': list(range(count))})}")
          PY

  audit-run:
    needs: plan
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run Audit
        uses: ./actions/audit
        with:
          repo: ${{ inputs.repo }}
          benchmarks: ${{ inputs.benchmarks }}
          output_dir: ./audit-output
          anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          anthropic_base_url: ${{ secrets.ANTHROPIC_BASE_URL }}
          model: ${{ secrets.ANTHROPIC_MODEL }}
          is_comment_event: ${{ github.event_name == 'issue_comment' || github.event_name == 'issues' || github.event_name == 'pull_request_review_comment' }}
          comment_event_type: ${{ github.event_name }}
          issue_number: ${{ github.event.issue.number }}
          pr_number: ${{ github.event.pull_request.number }}

      - name: Upload run results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-results-run-${{ matrix.run_id }}
          path: audit-output/
          if-no-files-found: ignore

  aggregate-audit:
    needs: [plan, audit-run]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Gearbox runtime
        uses: ./actions/_runtime

      - name: Download all run artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: audit-results-run-*
          path: ./audit-runs

      - name: Aggregate audit results
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          echo "::group::[audit] downloaded run artifacts"
          find ./audit-runs -maxdepth 2 -type f | sort || true
          echo "::endgroup::"

          CMD=(
            uv run --directory "$GITHUB_WORKSPACE" gearbox agent audit-select
            --input-root ./audit-runs
            --output-dir ./audit-output
          )

          if [ -n "$ANTHROPIC_MODEL" ]; then
            CMD+=(--model "$ANTHROPIC_MODEL")
          fi

          "${CMD[@]}"

      - name: Upload final results
        uses: actions/upload-artifact@v4
        with:
          name: audit-results
          path: audit-output/

  create-issues:
    if: inputs.create_issues
    needs: aggregate-audit
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_PAT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download results
        uses: actions/download-artifact@v4
        with:
          name: audit-results
          path: ./audit-output

      - name: Publish Issues
        uses: ./actions/publish
        with:
          input_path: ./audit-output/issues.json
