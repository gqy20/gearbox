name: 'Gearbox - CI Fix'
description: 'AI 驱动的 CI 失败自动修复'
author: 'gqy20'

inputs:
  github_token:
    description: 'GitHub Token'
    required: false
    default: ${{ github.token }}

  model:
    description: 'Claude 模型（建议 opus）'
    required: false
    default: 'claude-opus-4-7'

  max_turns:
    description: '最大对话轮次'
    required: false
    default: '15'

  base_branch:
    description: 'PR 目标分支'
    required: false
    default: 'main'

  dry_run:
    description: '试运行模式'
    required: false
    default: 'false'

  anthropic_api_key:
    description: 'Anthropic API Key'
    required: false
    default: ''

outputs:
  branch_name:
    description: '修复分支名'
    value: ${{ steps.run.outputs.branch_name }}
  root_cause:
    description: '根本原因'
    value: ${{ steps.run.outputs.root_cause }}
  pr_url:
    description: '修复 PR URL'
    value: ${{ steps.run.outputs.pr_url }}
  status:
    description: '执行状态'
    value: ${{ steps.run.outputs.status }}

runs:
  using: 'composite'
  steps:
    - name: Check environment
      shell: bash
      run: |
        echo "🔧 Gearbox CI Fix Agent"
        echo "Repo: ${{ github.repository }}"
        echo "Run ID: ${{ github.event.workflow_run.id }}"
        echo "Branch: ${{ github.event.workflow_run.head_branch }}"

    - name: Check API key
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
      run: |
        if [ -z "$ANTHROPIC_API_KEY" ] && [ -z "$ANTHROPIC_AUTH_TOKEN" ]; then
          echo "::error::API key required"
          exit 1
        fi

    - name: Prepare working branch
      shell: bash
      env:
        GEARBOX_BASE_BRANCH: ${{ inputs.base_branch }}
      run: |
        TEMP_BRANCH="gearbox/ci-fix-temp-$(date +%s)"
        git fetch origin $GEARBOX_BASE_BRANCH
        git checkout -b "$TEMP_BRANCH" "origin/$GEARBOX_BASE_BRANCH"
        echo "TEMP_BRANCH=$TEMP_BRANCH" >> $GITHUB_ENV

    - name: Run CI Fix Agent
      id: run
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
        GITHUB_OUTPUT: ${{ runner.temp }}/github_output
      run: |
        set -e
        if [ -n "$ANTHROPIC_API_KEY" ]; then
          export ANTHROPIC_AUTH_TOKEN="$ANTHROPIC_API_KEY"
        fi

        python3 -m gearbox.cli_agent ci-fix \
          --repo "${{ github.repository }}" \
          --run-id "${{ github.event.workflow_run.id }}" \
          --model "${{ inputs.model }}" \
          --base-branch "${{ inputs.base_branch }}" \
          --max-turns "${{ inputs.max_turns }}" \
          --output "$GITHUB_OUTPUT"

    - name: Finalize branch and PR
      if: ${{ inputs.dry_run == 'false' }}
      shell: bash
      env:
        GEARBOX_REPO: ${{ github.repository }}
        GEARBOX_RUN_ID: ${{ github.event.workflow_run.id }}
      run: |
        set -e
        source $GITHUB_OUTPUT

        if [ "$fixed" != "true" ] || [ -z "$branch_name" ]; then
          echo "⚠️ Agent did not complete fix, skipping PR creation"
          echo "status=partial" >> $GITHUB_OUTPUT
          exit 0
        fi

        # Rename temp branch and push
        TEMP_BRANCH="${TEMP_BRANCH:-gearbox/ci-fix-temp}"
        git branch -m "$TEMP_BRANCH" "$branch_name"

        # Parse files_changed from JSON
        FILES=$(echo '$files_changed' | python3 -c "import sys,json; print(' '.join(json.load(sys.stdin)))" 2>/dev/null || echo "")

        # Add and commit
        if [ -n "$FILES" ]; then
          for f in $FILES; do git add "$f"; done
        else
          git add -A
        fi

        if git diff --staged --quiet; then
          echo "⚠️ No changes to commit"
          echo "status=partial" >> $GITHUB_OUTPUT
          exit 0
        fi

        COMMIT_MSG="fix: $fix_description

        Root cause: $root_cause

        Closes #$GEARBOX_RUN_ID"
        git commit -m "$COMMIT_MSG"
        git push -u origin "$branch_name"

        # Create PR
        PR_URL=$(gh pr create \
          --repo "$GEARBOX_REPO" \
          --title "ci-fix: $fix_description" \
          --body "## Root Cause

$root_cause

## Fix

$fix_description

Closes #$GEARBOX_RUN_ID" \
          --head "$branch_name" \
          --base "$GEARBOX_BASE_BRANCH")

        echo "✅ PR created: $PR_URL"
        echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Cleanup on dry run
      if: ${{ inputs.dry_run == 'true' }}
      shell: bash
      run: |
        TEMP_BRANCH="${TEMP_BRANCH:-gearbox/ci-fix-temp-$(date +%s)}"
        git checkout "$GEARBOX_BASE_BRANCH"
        git branch -D "$TEMP_BRANCH" 2>/dev/null || true
        echo "status=dry_run" >> $GITHUB_OUTPUT
