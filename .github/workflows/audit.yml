name: Audit

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: '目标仓库 (留空则审计当前仓库)'
        required: false
        default: ''
      benchmarks:
        description: '对标仓库列表 (逗号分隔，可选)'
        required: false
        default: ''
      parallel_runs:
        description: '并行执行次数（workflow 编排层配置）'
        required: false
        default: '3'
      create_issues:
        description: '是否创建 Issues'
        required: false
        default: false
        type: boolean
      is_self_audit:
        description: '审计当前项目自身'
        required: false
        default: false
        type: boolean

  schedule:
    - cron: '0 1 * * 1'

  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, labeled]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  plan:
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'schedule') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@gearbox') && github.event.comment.user.id != github.event.installation.id) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@gearbox') && github.event.comment.user.id != github.event.installation.id) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@gearbox'))
    runs-on: ubuntu-latest
    outputs:
      repo: ${{ steps.target.outputs.repo }}
      matrix: ${{ steps.matrix.outputs.json }}
    steps:
      - name: Determine target repo
        id: target
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "repo=${{ github.repository }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ inputs.is_self_audit }}" == "true" ] || [ -z "${{ inputs.target_repo }}" ]; then
            echo "repo=${{ github.repository }}" >> "$GITHUB_OUTPUT"
          else
            echo "repo=${{ inputs.target_repo }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build matrix
        id: matrix
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.parallel_runs }}" ]; then
            COUNT="${{ inputs.parallel_runs }}"
          else
            COUNT="3"
          fi

          if ! [[ "$COUNT" =~ ^[0-9]+$ ]] || [ "$COUNT" -lt 1 ]; then
            echo "::error::parallel_runs must be a positive integer"
            exit 1
          fi

          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          count = int(os.environ["COUNT"])
          print(f"json={json.dumps({'run_id': list(range(count))})}")
          PY
        env:
          COUNT: ${{ github.event_name == 'workflow_dispatch' && inputs.parallel_runs || '3' }}

  audit-run:
    needs: plan
    if: needs.plan.outputs.repo != ''
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run Audit
        uses: ./actions/audit
        with:
          repo: ${{ needs.plan.outputs.repo }}
          benchmarks: ${{ github.event_name == 'workflow_dispatch' && inputs.benchmarks || '' }}
          output_dir: ./audit-output
          anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          anthropic_base_url: ${{ secrets.ANTHROPIC_BASE_URL }}
          model: ${{ secrets.ANTHROPIC_MODEL }}
          is_comment_event: ${{ github.event_name == 'issue_comment' || github.event_name == 'issues' || github.event_name == 'pull_request_review_comment' }}
          comment_event_type: ${{ github.event_name }}
          issue_number: ${{ github.event.issue.number }}
          pr_number: ${{ github.event.pull_request.number }}

      - name: Upload run results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-results-run-${{ matrix.run_id }}
          path: audit-output/
          if-no-files-found: ignore

  aggregate-audit:
    needs: [plan, audit-run]
    if: ${{ always() && needs.plan.outputs.repo != '' }}
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Gearbox runtime
        uses: ./actions/_runtime

      - name: Download all run artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: audit-results-run-*
          path: ./audit-runs

      - name: Aggregate audit results
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          echo "::group::[audit] downloaded run artifacts"
          find ./audit-runs -maxdepth 2 -type f | sort || true
          echo "::endgroup::"

          CMD=(
            uv run --directory "$GITHUB_WORKSPACE" gearbox agent audit-select
            --input-root ./audit-runs
            --output-dir ./audit-output
          )

          if [ -n "$ANTHROPIC_MODEL" ]; then
            CMD+=(--model "$ANTHROPIC_MODEL")
          fi

          "${CMD[@]}"

      - name: Upload final results
        uses: actions/upload-artifact@v4
        with:
          name: audit-results
          path: audit-output/

  create-issues:
    if: github.event_name == 'workflow_dispatch' && inputs.create_issues == true
    needs: aggregate-audit
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_PAT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download results
        uses: actions/download-artifact@v4
        with:
          name: audit-results
          path: ./audit-output

      - name: Publish Issues
        uses: ./actions/publish
        with:
          input_path: ./audit-output/issues.json
