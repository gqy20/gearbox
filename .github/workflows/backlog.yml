name: Backlog

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: '目标仓库 (留空则使用当前仓库)'
        required: false
        default: ''
      issues:
        description: '逗号或空格分隔的 Issue 编号；留空则自动 plan'
        required: false
        default: ''
      parallel_runs:
        description: '并行执行次数（workflow 编排层配置）'
        required: false
        default: '3'
  schedule:
    - cron: '15 */2 * * *'
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: true

jobs:
  plan:
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'schedule') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@backlog') && github.event.comment.user.id != github.event.installation.id)
    runs-on: ubuntu-latest
    outputs:
      repo: ${{ steps.target.outputs.repo }}
      issues: ${{ steps.issues.outputs.issues }}
      matrix_json: ${{ steps.matrix.outputs.matrix_json }}
      comment_mode: ${{ steps.target.outputs.comment_mode }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Gearbox runtime
        uses: ./actions/_runtime

      - name: Determine target
        id: target
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ inputs.target_repo }}" ]; then
              echo "repo=${{ inputs.target_repo }}" >> "$GITHUB_OUTPUT"
            else
              echo "repo=${{ github.repository }}" >> "$GITHUB_OUTPUT"
            fi
            echo "comment_mode=auto" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            echo "repo=${{ github.repository }}" >> "$GITHUB_OUTPUT"
            echo "comment_mode=never" >> "$GITHUB_OUTPUT"
          else
            echo "repo=${{ github.repository }}" >> "$GITHUB_OUTPUT"
            echo "comment_mode=auto" >> "$GITHUB_OUTPUT"
          fi

      - name: Plan backlog issues
        id: planned
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.issues == '')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"

          uv run --directory "$GEARBOX_ACTION_ROOT" gearbox backlog plan \
            --repo "${{ steps.target.outputs.repo }}" \
            --max-items 5 \
            --json-output > backlog-plan.json

          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json

          with open("backlog-plan.json", encoding="utf-8") as fh:
              plan = json.load(fh)

          issues = [str(item["issue_number"]) for item in plan.get("items", [])]
          print(f"issues={','.join(issues)}")
          PY

      - name: Resolve issue list
        id: issues
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.issues }}" ]; then
            echo "issues=${{ inputs.issues }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ steps.planned.outputs.issues }}" ]; then
            echo "issues=${{ steps.planned.outputs.issues }}" >> "$GITHUB_OUTPUT"
          else
            echo "issues=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build matrix
        id: matrix
        uses: ./actions/matrix
        with:
          count: ${{ github.event_name == 'workflow_dispatch' && inputs.parallel_runs || '3' }}
          issues: ${{ steps.issues.outputs.issues }}

  backlog-run:
    needs: plan
    if: needs.plan.outputs.repo != '' && needs.plan.outputs.issues != ''
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix_json) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run Backlog
        uses: ./actions/backlog
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          repo: ${{ needs.plan.outputs.repo }}
          issues: ${{ matrix.issue_number }}
          max_turns: '5'
          model: ${{ secrets.ANTHROPIC_MODEL }}
          anthropic_base_url: ${{ secrets.ANTHROPIC_BASE_URL }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          artifact_path: ./backlog-output/result.json
          apply_side_effects: 'false'

      - name: Upload run results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backlog-results-issue-${{ matrix.issue_number }}-run-${{ matrix.run_id }}
          path: backlog-output/
          if-no-files-found: ignore

  aggregate-backlog:
    needs: [plan, backlog-run]
    if: ${{ always() && needs.plan.result == 'success' && needs.plan.outputs.repo != '' && needs.plan.outputs.issues != '' }}
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Gearbox runtime
        uses: ./actions/_runtime

      - name: Download all run artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: backlog-results-issue-*-run-*
          path: ${{ github.workspace }}/backlog-runs

      - name: Aggregate backlog results
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          echo "::group::[backlog] downloaded run artifacts"
          find "$GITHUB_WORKSPACE/backlog-runs" -maxdepth 2 -type f | sort || true
          echo "::endgroup::"

          CMD=(
            uv run --directory "$GEARBOX_ACTION_ROOT" gearbox agent backlog-select
            --input-root "$GITHUB_WORKSPACE/backlog-runs"
            --repo "${{ needs.plan.outputs.repo }}"
            --artifact-path "$GITHUB_WORKSPACE/backlog-output/result.json"
            --comment-mode "${{ needs.plan.outputs.comment_mode }}"
            --max-turns 29
          )

          if [ -n "$ANTHROPIC_MODEL" ]; then
            CMD+=(--model "$ANTHROPIC_MODEL")
          fi

          "${CMD[@]}"

      - name: Upload final result
        uses: actions/upload-artifact@v7
        with:
          name: backlog-results
          path: backlog-output/
