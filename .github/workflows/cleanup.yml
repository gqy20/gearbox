name: Cleanup

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue 编号
        required: true
        type: number
      dry_run:
        description: 是否只输出计划，不删除分支
        required: false
        default: true
        type: boolean
      protect_open_prs:
        description: 是否保护仍被 open PR 使用的候选分支
        required: false
        default: true
        type: boolean
  pull_request:
    types: [closed]

permissions:
  contents: write
  issues: write
  pull-requests: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve issue number
        id: issue
        uses: ./actions/workflow-entry
        with:
          event_name: ${{ github.event_name }}
          head_ref: ${{ github.event.pull_request.head.ref }}
          workflow_issue_number: ${{ github.event_name == 'workflow_dispatch' && inputs.issue_number || '' }}
          default_repo: ${{ github.repository }}

      - name: Run Cleanup
        if: steps.issue.outputs.skip != 'true'
        uses: ./actions/cleanup
        with:
          repo: ${{ steps.issue.outputs.target_repo }}
          issue_number: ${{ steps.issue.outputs.issue_number }}
          dry_run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
          protect_open_prs: ${{ github.event_name == 'workflow_dispatch' && inputs.protect_open_prs || 'true' }}

      - name: Restore issue when PR closed unmerged
        if: >-
          steps.issue.outputs.skip != 'true' &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.merged == false
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          GEARBOX_ACTION_ROOT: ${{ github.workspace }}
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"

          uv run --directory "$GEARBOX_ACTION_ROOT" gearbox cleanup-restore-unmerged-pr \
            --repo "${{ steps.issue.outputs.target_repo }}" \
            --issue "${{ steps.issue.outputs.issue_number }}" \
            --pr "${{ github.event.pull_request.number }}" \
            --pr-url "${{ github.event.pull_request.html_url }}"
