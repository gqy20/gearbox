name: Audit

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: '目标仓库 (留空则审计当前仓库)'
        required: false
        default: ''
      benchmarks:
        description: '对标仓库列表 (逗号分隔，可选)'
        required: false
        default: ''
      create_issues:
        description: '是否创建 Issues'
        required: false
        default: false
        type: boolean
      is_self_audit:
        description: '审计当前项目自身'
        required: false
        default: false
        type: boolean

  schedule:
    - cron: '0 1 * * 1'

  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, labeled]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  audit:
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'schedule') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@gearbox') && github.event.comment.user.id != github.event.installation.id) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@gearbox') && github.event.comment.user.id != github.event.installation.id) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@gearbox'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Determine target repo
        id: target
        run: |
          if [ "${{ inputs.is_self_audit }}" == "true" ] || [ "${{ github.event_name }}" == "schedule" ]; then
            echo "repo=${{ github.repository }}" >> $GITHUB_OUTPUT
          else
            echo "repo=${{ inputs.target_repo }}" >> $GITHUB_OUTPUT
          fi

      - name: Run Audit
        uses: ./actions/main
        with:
          action: audit
          repo: ${{ steps.target.outputs.repo }}
          benchmarks: ${{ inputs.benchmarks }}
          output_dir: ./audit-output
          anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          parallel_count: 3
          is_comment_event: ${{ github.event_name == 'issue_comment' || github.event_name == 'issues' || github.event_name == 'pull_request_review_comment' }}
          comment_event_type: ${{ github.event_name }}
          issue_number: ${{ github.event.issue.number }}
          pr_number: ${{ github.event.pull_request.number }}

      - name: Upload results
        if: steps.target.outputs.repo != ''
        uses: actions/upload-artifact@v7
        with:
          name: audit-results
          path: audit-output/

  create-issues:
    if: |
      github.event_name == 'workflow_dispatch' &&
      inputs.create_issues == true
    needs: audit
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_PAT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download results
        uses: actions/download-artifact@v8
        with:
          name: audit-results
          path: ./audit-output

      - name: Publish Issues
        uses: ./actions/main
        with:
          action: publish
          input_path: ./audit-output/issues.json
