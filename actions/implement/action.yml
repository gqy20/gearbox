name: Gearbox - Implement
description: AI 驱动的 Issue → 分支/PR 自动实现
author: gqy20

inputs:
  repo:
    description: 仓库标识 (owner/name)
    required: true
  issue_number:
    description: Issue 编号
    required: true
    type: number
  base_branch:
    description: PR 目标分支
    required: false
    default: main
  max_turns:
    description: 最大对话轮次
    required: false
    default: '80'
  model:
    description: 使用的模型（可选）
    required: false
    default: ''
  anthropic_base_url:
    description: Anthropic 兼容接口 Base URL（可选）
    required: false
    default: ''
  anthropic_api_key:
    description: Anthropic API Key
    required: false
    default: ''
  artifact_path:
    description: '可选: 写出结构化结果 artifact'
    required: false
    default: ./implement-output/result.json
  push_candidate_branch:
    description: 是否推送候选实现分支
    required: false
    default: 'true'
  create_pr:
    description: 是否创建 PR（通常只由聚合阶段或单路实现开启）
    required: false
    default: 'false'
  candidate_branch_suffix:
    description: 候选分支后缀，用于并行实现隔离
    required: false
    default: ''
  run_id:
    description: 并行运行 ID（注入分支名确保唯一）
    required: false
    default: '0'

outputs:
  status:
    description: 执行状态
    value: ${{ steps.run.outputs.status }}

runs:
  using: composite
  steps:
  - name: Setup Gearbox runtime
    uses: ./actions/_runtime

  - name: Run Implement Agent
    id: run
    shell: bash
    env:
      ANTHROPIC_API_KEY: ${{ env.ANTHROPIC_AUTH_TOKEN || inputs.anthropic_api_key }}
      ANTHROPIC_BASE_URL_INPUT: ${{ env.ANTHROPIC_BASE_URL || inputs.anthropic_base_url }}
      ANTHROPIC_MODEL_INPUT: ${{ env.ANTHROPIC_MODEL || inputs.model }}
    run: |
      set -e

      if [ -n "$ANTHROPIC_API_KEY" ]; then
        export ANTHROPIC_AUTH_TOKEN="$ANTHROPIC_API_KEY"
      fi
      if [ -n "$ANTHROPIC_BASE_URL_INPUT" ]; then
        export ANTHROPIC_BASE_URL="$ANTHROPIC_BASE_URL_INPUT"
      fi
      export PATH="$HOME/.local/bin:$PATH"

      if { [ "${{ inputs.push_candidate_branch }}" = "true" ] || [ "${{ inputs.create_pr }}" = "true" ]; } && [ -z "${GH_TOKEN:-}" ]; then
        echo "::error::GH_TOKEN is required when push_candidate_branch=true or create_pr=true. Pass secrets.GH_PAT so Gearbox can push branches or create PRs."
        exit 1
      fi

      INPUT_ARTIFACT_PATH="${{ inputs.artifact_path }}"
      ARTIFACT_PATH=""
      if [ -n "$INPUT_ARTIFACT_PATH" ]; then
        case "$INPUT_ARTIFACT_PATH" in
          /*) ARTIFACT_PATH="$INPUT_ARTIFACT_PATH" ;;
          *) ARTIFACT_PATH="${GITHUB_WORKSPACE}/${INPUT_ARTIFACT_PATH#./}" ;;
        esac
        mkdir -p "$(dirname "$ARTIFACT_PATH")"
      fi

      CMD=(
        uv run --project "${GITHUB_ACTION_PATH}/../.." --directory "$GITHUB_WORKSPACE" gearbox agent implement
        --repo "${{ inputs.repo }}"
        --issue "${{ inputs.issue_number }}"
        --base-branch "${{ inputs.base_branch }}"
        --max-turns "${{ inputs.max_turns }}"
      )

      if [ -n "$ARTIFACT_PATH" ]; then
        CMD+=(--artifact-path "$ARTIFACT_PATH")
      fi

      if [ -n "$ANTHROPIC_MODEL_INPUT" ]; then
        CMD+=(--model "$ANTHROPIC_MODEL_INPUT")
      fi

      if [ "${{ inputs.push_candidate_branch }}" = "true" ]; then
        CMD+=(--push-candidate-branch)
      else
        CMD+=(--no-push-candidate-branch)
      fi

      if [ "${{ inputs.create_pr }}" = "true" ]; then
        CMD+=(--create-pr)
      else
        CMD+=(--no-create-pr)
      fi

      if [ -n "${{ inputs.candidate_branch_suffix }}" ]; then
        CMD+=(--candidate-branch-suffix "${{ inputs.candidate_branch_suffix }}")
      fi

      if [ -n "${{ inputs.run_id }}" ]; then
        CMD+=(--run-id "${{ inputs.run_id }}")
      fi

      "${CMD[@]}"

      echo "status=success" >> $GITHUB_OUTPUT
