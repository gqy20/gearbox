name: Reusable Review

on:
  workflow_call:
    inputs:
      repo:
        description: '目标仓库 (owner/name)'
        required: true
        type: string
      pr_number:
        description: 'PR 编号'
        required: true
        type: number
      parallel_runs:
        description: '并行执行次数'
        required: false
        default: '3'
        type: string
    secrets:
      ANTHROPIC_AUTH_TOKEN:
        required: true
      ANTHROPIC_BASE_URL:
        required: false
      ANTHROPIC_MODEL:
        required: false

permissions:
  contents: read
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.json }}
    steps:
      - name: Build matrix
        id: matrix
        shell: bash
        env:
          COUNT: ${{ inputs.parallel_runs }}
        run: |
          if ! [[ "$COUNT" =~ ^[0-9]+$ ]] || [ "$COUNT" -lt 1 ]; then
            echo "::error::parallel_runs must be a positive integer"
            exit 1
          fi

          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          count = int(os.environ["COUNT"])
          print(f"json={json.dumps({'run_id': list(range(count))})}")
          PY

  review-run:
    needs: plan
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run Review
        uses: ./actions/review
        with:
          repo: ${{ inputs.repo }}
          pr_number: ${{ inputs.pr_number }}
          max_turns: '10'
          model: ${{ secrets.ANTHROPIC_MODEL }}
          anthropic_base_url: ${{ secrets.ANTHROPIC_BASE_URL }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          artifact_path: ./review-output/result.json
          apply_side_effects: 'false'

      - name: Upload run results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: review-results-run-${{ matrix.run_id }}
          path: review-output/
          if-no-files-found: ignore

  aggregate-review:
    needs: [plan, review-run]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup tools
        uses: ./actions/_setup

      - name: Download all run artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: review-results-run-*
          path: ./review-runs

      - name: Aggregate review results
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          CMD=(
            uv run --directory "$GITHUB_WORKSPACE" gearbox agent review-select
            --input-root ./review-runs
            --repo "${{ inputs.repo }}"
            --pr "${{ inputs.pr_number }}"
            --artifact-path ./review-output/result.json
          )

          if [ -n "$ANTHROPIC_MODEL" ]; then
            CMD+=(--model "$ANTHROPIC_MODEL")
          fi

          "${CMD[@]}"

      - name: Upload final result
        uses: actions/upload-artifact@v7
        with:
          name: review-results
          path: review-output/
