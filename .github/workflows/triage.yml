name: Triage

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: '目标仓库 (留空则使用当前仓库)'
        required: false
        default: ''
      issue_number:
        description: 'Issue 编号'
        required: true
        type: number
      parallel_runs:
        description: '并行执行次数（workflow 编排层配置）'
        required: false
        default: '3'
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

jobs:
  triage:
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@gearbox')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@gearbox') && github.event.comment.user.id != github.event.installation.id)
    uses: ./.github/workflows/reusable-triage.yml
    with:
      repo: ${{ github.event_name == 'workflow_dispatch' && (inputs.target_repo || github.repository) || github.repository }}
      issue_number: ${{ github.event_name == 'workflow_dispatch' && inputs.issue_number || github.event.issue.number }}
      parallel_runs: ${{ github.event_name == 'workflow_dispatch' && inputs.parallel_runs || '3' }}
    secrets: inherit
