name: Reusable Audit

on:
  workflow_call:
    inputs:
      repo:
        description: '目标仓库 (owner/name)'
        required: true
        type: string
      benchmarks:
        description: '对标仓库列表 (逗号分隔，可选)'
        required: false
        default: ''
        type: string
      parallel_runs:
        description: '并行执行次数'
        required: false
        default: '3'
        type: string
      create_issues:
        description: '是否创建 Issues'
        required: false
        default: false
        type: boolean
    secrets:
      ANTHROPIC_AUTH_TOKEN:
        required: true
      ANTHROPIC_BASE_URL:
        required: false
      ANTHROPIC_MODEL:
        required: false
      GH_PAT:
        required: false

permissions:
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix_json: ${{ steps.matrix.outputs.matrix_json }}
    steps:
      - name: Build matrix
        id: matrix
        uses: gqy20/gearbox/actions/matrix@main
        with:
          count: ${{ inputs.parallel_runs }}

  audit-run:
    needs: plan
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix_json) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Mask secrets
        shell: bash
        run: |
          echo "::add-mask::${{ secrets.ANTHROPIC_AUTH_TOKEN }}"
          echo "::add-mask::${{ secrets.ANTHROPIC_BASE_URL }}"

      - name: Run Audit
        uses: gqy20/gearbox/actions/audit@main
        env:
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
        with:
          repo: ${{ inputs.repo }}
          benchmarks: ${{ inputs.benchmarks }}
          output_dir: ./audit-output
          is_comment_event: ${{ github.event_name == 'issue_comment' }}
          comment_event_type: ${{ github.event_name }}
          issue_number: ${{ github.event.issue.number }}
          pr_number: ${{ github.event.pull_request.number }}

      - name: Upload run results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-results-run-${{ matrix.run_id }}
          path: audit-output/
          if-no-files-found: ignore

  aggregate-audit:
    needs: [plan, audit-run]
    if: ${{ always() && needs.plan.result == 'success' }}
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Mask secrets
        shell: bash
        run: |
          echo "::add-mask::${{ secrets.ANTHROPIC_AUTH_TOKEN }}"
          echo "::add-mask::${{ secrets.ANTHROPIC_BASE_URL }}"

      - name: Setup Gearbox runtime
        uses: gqy20/gearbox/actions/_runtime@main

      - name: Download all run artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: audit-results-run-*
          path: ${{ github.workspace }}/audit-runs

      - name: Aggregate audit results
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          echo "::group::[audit] downloaded run artifacts"
          find "$GITHUB_WORKSPACE/audit-runs" -maxdepth 2 -type f | sort || true
          echo "::endgroup::"

          CMD=(
            uv run --directory "$GEARBOX_ACTION_ROOT" gearbox agent audit-select
            --input-root "$GITHUB_WORKSPACE/audit-runs"
            --output-dir "$GITHUB_WORKSPACE/audit-output"
            --max-turns 29
          )

          if [ -n "$ANTHROPIC_MODEL" ]; then
            CMD+=(--model "$ANTHROPIC_MODEL")
          fi

          "${CMD[@]}"

      - name: Upload final results
        uses: actions/upload-artifact@v4
        with:
          name: audit-results
          path: audit-output/

  create-issues:
    if: inputs.create_issues
    needs: aggregate-audit
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_PAT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download results
        uses: actions/download-artifact@v4
        with:
          name: audit-results
          path: ./audit-output

      - name: Publish Issues
        uses: gqy20/gearbox/actions/publish@main
        with:
          input_path: ./audit-output/issues.json
