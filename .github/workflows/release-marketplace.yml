name: Release Marketplace Bundle

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      target_branch:
        description: '发布仓分支'
        required: false
        default: 'main'

permissions:
  contents: read

jobs:
  bundle:
    runs-on: ubuntu-latest
    outputs:
      target_branch: ${{ steps.target.outputs.branch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Sync Gearbox environment
        run: uv sync

      - name: Package Marketplace bundle
        run: uv run gearbox package-marketplace --output-dir ./dist/gearbox-action

      - name: Render release notes
        if: github.ref_type == 'tag'
        run: uv run gearbox release-notes --version "${{ github.ref_name }}" --output-file ./dist/release-notes.md

      - name: Resolve target branch
        id: target
        run: |
          BRANCH="${{ inputs.target_branch }}"
          if [ -z "$BRANCH" ]; then
            BRANCH="main"
          fi

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Upload bundle
        uses: actions/upload-artifact@v7
        with:
          name: gearbox-action-bundle
          path: ./dist/gearbox-action

      - name: Upload release notes
        if: github.ref_type == 'tag'
        uses: actions/upload-artifact@v7
        with:
          name: gearbox-action-release-notes
          path: ./dist/release-notes.md

  sync:
    needs: bundle
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download bundle
        uses: actions/download-artifact@v8
        with:
          name: gearbox-action-bundle
          path: ./bundle

      - name: Download release notes
        if: github.ref_type == 'tag'
        uses: actions/download-artifact@v8
        with:
          name: gearbox-action-release-notes
          path: ./release-notes

      - name: Push bundle to release repository
        env:
          TARGET_REPOSITORY: gqy20/gearbox-action
          TARGET_BRANCH: ${{ needs.bundle.outputs.target_branch }}
          GH_PAT: ${{ secrets.GH_PAT }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail

          if [ -z "${GH_PAT}" ]; then
            echo "::error::Missing GH_PAT secret"
            exit 1
          fi

          git clone "https://x-access-token:${GH_PAT}@github.com/${TARGET_REPOSITORY}.git" release-repo
          cd release-repo
          git checkout "${TARGET_BRANCH}" || git checkout -b "${TARGET_BRANCH}"

          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -R ../bundle/. .

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BUNDLE_CHANGED="false"
          git add .
          if git diff --cached --quiet; then
            echo "No bundle changes to publish"
          else
            git commit -m "release: sync ${RELEASE_TAG}"
            git push origin "${TARGET_BRANCH}"
            BUNDLE_CHANGED="true"
          fi

          if [ "${RELEASE_REF_TYPE}" != "tag" ]; then
            echo "Skip tag sync for ref type: ${RELEASE_REF_TYPE}"
            exit 0
          fi

          git tag -fa "${RELEASE_TAG}" -m "Release ${RELEASE_TAG}"
          git push origin "refs/tags/${RELEASE_TAG}" --force

          MAJOR_TAG="$(printf '%s' "${RELEASE_TAG}" | sed -E 's/^(v[0-9]+).*/\1/')"
          if [ -n "${MAJOR_TAG}" ] && [ "${MAJOR_TAG}" != "${RELEASE_TAG}" ]; then
            git tag -fa "${MAJOR_TAG}" -m "Release ${MAJOR_TAG}"
            git push origin "refs/tags/${MAJOR_TAG}" --force
          fi

          export GH_TOKEN="${GH_PAT}"

          if gh release view "${RELEASE_TAG}" -R "${TARGET_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              -R "${TARGET_REPOSITORY}" \
              --title "Gearbox Action ${RELEASE_TAG}" \
              --notes-file ../release-notes/release-notes.md
          else
            gh release create "${RELEASE_TAG}" \
              -R "${TARGET_REPOSITORY}" \
              --title "Gearbox Action ${RELEASE_TAG}" \
              --notes-file ../release-notes/release-notes.md
          fi

          if [ "${BUNDLE_CHANGED}" = "false" ]; then
            echo "Bundle unchanged; updated tags/release metadata only."
          fi
