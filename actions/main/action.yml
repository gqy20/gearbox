name: Gearbox AI Flywheel
description: Unified AI automation entrypoint for repository audit, backlog, cleanup, review, implementation, and publishing
author: gqy20

branding:
  icon: package
  color: blue

inputs:
  action:
    description: 'Action to run: audit, backlog, cleanup, dispatch, implement, review, publish'
    required: true
  repo:
    description: 仓库标识 (owner/name)
    required: false
    default: ''
  issue_number:
    description: Issue 编号
    required: false
    default: ''
  issues:
    description: 逗号或空格分隔的 Issue 编号，数量决定单 issue 或 backlog 批量处理
    required: false
    default: ''
  pr_number:
    description: PR 编号
    required: false
    default: ''
  cleanup_dry_run:
    description: cleanup 是否只输出计划，不删除分支
    required: false
    default: 'true'
  input_path:
    description: issues.json 文件路径
    required: false
    default: ''
  max_items:
    description: dispatch 最多处理多少个 Issue
    required: false
    default: '1'
  dry_run:
    description: dispatch 是否只输出计划，不创建分支和 PR
    required: false
    default: 'true'
  benchmarks:
    description: 逗号分隔的对标仓库列表（可选）
    required: false
    default: ''
  is_comment_event:
    description: 是否由 issue/PR 触发的评论事件
    required: false
    default: 'false'
  comment_event_type:
    description: 事件类型
    required: false
    default: ''
  output_dir:
    description: 输出目录
    required: false
    default: ./output
  system_prompt:
    description: 自定义 System Prompt（audit 可选）
    required: false
    default: ''
  base_branch:
    description: PR 目标分支
    required: false
    default: main
  max_turns:
    description: 最大对话轮次
    required: false
    default: '80'
  model:
    description: 使用的模型（可选）
    required: false
    default: ''
  anthropic_base_url:
    description: Anthropic 兼容接口 Base URL（可选）
    required: false
    default: ''
  anthropic_api_key:
    description: Anthropic API Key
    required: false
    default: ''

outputs:
  status:
    description: 执行状态
    value: ${{ steps.outputs.outputs.status }}
  issues_count:
    description: 生成的 Issue 数量（audit 时）
    value: ${{ steps.outputs.outputs.issues_count }}

runs:
  using: composite
  steps:
  - name: Validate requested action
    shell: bash
    run: |
      case "${{ inputs.action }}" in
        audit|backlog|cleanup|dispatch|implement|review|publish) ;;
        *)
          echo "::error::Unsupported action '${{ inputs.action }}'"
          exit 1
          ;;
      esac

  - name: Run Audit
    id: audit
    if: ${{ inputs.action == 'audit' }}
    uses: ./actions/audit
    with:
      repo: ${{ inputs.repo }}
      benchmarks: ${{ inputs.benchmarks }}
      is_comment_event: ${{ inputs.is_comment_event }}
      comment_event_type: ${{ inputs.comment_event_type }}
      issue_number: ${{ inputs.issue_number }}
      pr_number: ${{ inputs.pr_number }}
      output_dir: ${{ inputs.output_dir }}
      system_prompt: ${{ inputs.system_prompt }}
      max_turns: ${{ inputs.max_turns }}
      model: ${{ inputs.model }}
      anthropic_base_url: ${{ inputs.anthropic_base_url }}
      anthropic_api_key: ${{ inputs.anthropic_api_key }}

  - name: Run Backlog
    id: backlog
    if: ${{ inputs.action == 'backlog' }}
    uses: ./actions/backlog
    with:
      repo: ${{ inputs.repo }}
      issues: ${{ inputs.issues }}
      max_turns: ${{ inputs.max_turns }}
      model: ${{ inputs.model }}
      anthropic_base_url: ${{ inputs.anthropic_base_url }}
      anthropic_api_key: ${{ inputs.anthropic_api_key }}

  - name: Run Implement
    id: implement
    if: ${{ inputs.action == 'implement' }}
    uses: ./actions/implement
    with:
      repo: ${{ inputs.repo }}
      issue_number: ${{ inputs.issue_number }}
      base_branch: ${{ inputs.base_branch }}
      max_turns: ${{ inputs.max_turns }}
      model: ${{ inputs.model }}
      anthropic_base_url: ${{ inputs.anthropic_base_url }}
      anthropic_api_key: ${{ inputs.anthropic_api_key }}

  - name: Run Cleanup
    id: cleanup
    if: ${{ inputs.action == 'cleanup' }}
    uses: ./actions/cleanup
    with:
      repo: ${{ inputs.repo }}
      issue_number: ${{ inputs.issue_number }}
      dry_run: ${{ inputs.cleanup_dry_run }}

  - name: Run Dispatch
    id: dispatch
    if: ${{ inputs.action == 'dispatch' }}
    uses: ./actions/dispatch
    with:
      repo: ${{ inputs.repo }}
      issue_number: ${{ inputs.issue_number }}
      max_items: ${{ inputs.max_items }}
      base_branch: ${{ inputs.base_branch }}
      dry_run: ${{ inputs.dry_run }}
      max_turns: ${{ inputs.max_turns }}
      model: ${{ inputs.model }}
      anthropic_base_url: ${{ inputs.anthropic_base_url }}
      anthropic_api_key: ${{ inputs.anthropic_api_key }}

  - name: Run Review
    id: review
    if: ${{ inputs.action == 'review' }}
    uses: ./actions/review
    with:
      repo: ${{ inputs.repo }}
      pr_number: ${{ inputs.pr_number }}
      max_turns: ${{ inputs.max_turns }}
      model: ${{ inputs.model }}
      anthropic_base_url: ${{ inputs.anthropic_base_url }}
      anthropic_api_key: ${{ inputs.anthropic_api_key }}

  - name: Run Publish
    id: publish
    if: ${{ inputs.action == 'publish' }}
    uses: ./actions/publish
    with:
      input_path: ${{ inputs.input_path }}

  - name: Collect outputs
    id: outputs
    shell: bash
    env:
      AUDIT_STATUS: ${{ steps.audit.outputs.status }}
      BACKLOG_STATUS: ${{ steps.backlog.outputs.status }}
      CLEANUP_STATUS: ${{ steps.cleanup.outputs.status }}
      IMPLEMENT_STATUS: ${{ steps.implement.outputs.status }}
      DISPATCH_STATUS: ${{ steps.dispatch.outputs.status }}
      REVIEW_STATUS: ${{ steps.review.outputs.status }}
      PUBLISH_STATUS: ${{ steps.publish.outputs.status }}
      AUDIT_ISSUES_COUNT: ${{ steps.audit.outputs.issues_count }}
    run: |
      STATUS="$AUDIT_STATUS"
      if [ -z "$STATUS" ]; then STATUS="$BACKLOG_STATUS"; fi
      if [ -z "$STATUS" ]; then STATUS="$CLEANUP_STATUS"; fi
      if [ -z "$STATUS" ]; then STATUS="$IMPLEMENT_STATUS"; fi
      if [ -z "$STATUS" ]; then STATUS="$DISPATCH_STATUS"; fi
      if [ -z "$STATUS" ]; then STATUS="$REVIEW_STATUS"; fi
      if [ -z "$STATUS" ]; then STATUS="$PUBLISH_STATUS"; fi

      echo "status=${STATUS:-success}" >> "$GITHUB_OUTPUT"
      echo "issues_count=${AUDIT_ISSUES_COUNT:-0}" >> "$GITHUB_OUTPUT"
