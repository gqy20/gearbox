name: Reusable Implement

on:
  workflow_call:
    inputs:
      repo:
        description: '目标仓库 (owner/name)'
        required: true
        type: string
      issue_number:
        description: Issue 编号'
        required: true
        type: number
      base_branch:
        description: PR 目标分支'
        required: false
        default: main
        type: string
      parallel_runs:
        description: '并行执行次数'
        required: false
        default: '3'
        type: string
    secrets:
      ANTHROPIC_AUTH_TOKEN:
        required: true
      ANTHROPIC_BASE_URL:
        required: false
      ANTHROPIC_MODEL:
        required: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.json }}
    steps:
      - name: Build matrix
        id: matrix
        shell: bash
        env:
          COUNT: ${{ inputs.parallel_runs }}
        run: |
          if ! [[ "$COUNT" =~ ^[0-9]+$ ]] || [ "$COUNT" -lt 1 ]; then
            echo "::error::parallel_runs must be a positive integer"
            exit 1
          fi

          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          count = int(os.environ["COUNT"])
          print(f"json={json.dumps({'run_id': list(range(count))})}")
          PY

  implement-run:
    needs: plan
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run Implement
        uses: gqy20/gearbox/actions/implement@main
        with:
          repo: ${{ inputs.repo }}
          issue_number: ${{ inputs.issue_number }}
          base_branch: ${{ inputs.base_branch }}
          max_turns: '20'
          model: ${{ secrets.ANTHROPIC_MODEL }}
          anthropic_base_url: ${{ secrets.ANTHROPIC_BASE_URL }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          artifact_path: ./implement-output/result.json
          apply_side_effects: 'false'

      - name: Upload run results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: implement-results-run-${{ matrix.run_id }}
          path: implement-output/
          if-no-files-found: ignore

  aggregate-implement:
    needs: [plan, implement-run]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Gearbox runtime
        uses: gqy20/gearbox/actions/_runtime@main

      - name: Download all run artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: implement-results-run-*
          path: ./implement-runs

      - name: Aggregate implement results
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          CMD=(
            uv run --directory "$GITHUB_WORKSPACE" gearbox agent implement-select
            --input-root ./implement-runs
            --repo "${{ inputs.repo }}"
            --issue "${{ inputs.issue_number }}"
            --base-branch "${{ inputs.base_branch }}"
            --artifact-path ./implement-output/result.json
            --max-turns 29
          )

          if [ -n "$ANTHROPIC_MODEL" ]; then
            CMD+=(--model "$ANTHROPIC_MODEL")
          fi

          "${CMD[@]}"

      - name: Upload final result
        uses: actions/upload-artifact@v7
        with:
          name: implement-results
          path: implement-output/
